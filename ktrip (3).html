function buildMateWrite(){
  const page=div('write-page');
  if(!S._back) page.classList.add('slide-right');
  const steps=['축제 선택','일정·인원','조건 설정','소개글 작성'];
  const step=S.writeStep;
  const data=S.writeData;

  // 헤더
  const hdr=div('full-list-header');
  const bk=backBtn(()=>{
    if(step===0) goBack({mateView:null,writeStep:0,writeData:{}});
    else setState({writeStep:step-1});
  });
  const ttl=div('full-list-title',`${step+1}단계 · ${steps[step]}`);
  ap(hdr,bk,ttl);

  // 프로그레스
  const progBar=div('write-progress');
  const progFill=div('write-progress-fill');
  css(progFill,{width:`${((step+1)/steps.length)*100}%`});
  progBar.appendChild(progFill);

  // 스텝 컨텐츠
  const stepDiv=div('write-step');

  if(step===0){
    let step0Next=null;
    ap(stepDiv,div('write-step-title','어떤 축제에\n가고 싶으신가요?'),div('write-step-sub','동행을 모집할 축제를 선택해주세요'));
    const festBtns={};
    S.festivals.forEach(f=>{
      const opt=div(`fest-option${data.festivalId===f.id?' sel':''}`);
      opt.onclick=()=>{
        Object.assign(data,{festivalId:f.id,festName:f.title,festDate:f.date});
        Object.values(festBtns).forEach(b=>b.className='fest-option');
        opt.className='fest-option sel';
        if(step0Next) step0Next.disabled=false;
      };
      festBtns[f.id]=opt;
      const img=el('img','fest-option-img');img.src=f.img;img.alt=f.title;
      const info=div('fest-option-info');
      ap(info,div('fest-option-name',f.title),div('fest-option-date',`📍 ${f.loc} · ${f.date}`));
      ap(opt,img,info);
      stepDiv.appendChild(opt);
    });
    // footer 먼저 빌드해서 step0Next 연결
    const footer0=div('write-footer');
    const next0=btn('write-next-btn','다음',()=>setState({writeStep:1}));
    next0.disabled=!data.festivalId;
    step0Next=next0;
    footer0.appendChild(next0);
    ap(page,hdr,progBar,stepDiv,footer0);
    return page;
  } else if(step===1){
    ap(stepDiv,div('write-step-title','언제 만날까요?'),div('write-step-sub','만남 일시와 모집 인원을 설정하세요'));
    const dl=div('write-label','만남 날짜');
    const di=el('input','write-input');di.type='date';di.value=data.meetDate||'';
    di.oninput=e=>Object.assign(data,{meetDate:e.target.value});
    const tl=div('write-label','만남 시간');
    const ti=el('input','write-input');ti.type='time';ti.value=data.meetTime||'';
    ti.oninput=e=>Object.assign(data,{meetTime:e.target.value});
    const sl=div('write-label','모집 인원 (본인 포함)');
    const sChips=div('option-chips');
    const slotBtns={};
    [2,3,4,5,6].forEach(n=>{
      const c=btn(`option-chip${data.totalSlots===n?' sel':''}`,`${n}명`,()=>{
        Object.assign(data,{totalSlots:n});
        // DOM 직접 토글 — setState 없음
        Object.entries(slotBtns).forEach(([k,b])=>{
          b.className='option-chip'+(Number(k)===n?' sel':'');
        });
      });
      slotBtns[n]=c;
      sChips.appendChild(c);
    });
    ap(stepDiv,dl,di,tl,ti,sl,sChips);
  } else if(step===2){
    ap(stepDiv,div('write-step-title','어떤 분과\n함께 하고 싶으세요?'),div('write-step-sub','동행 조건을 설정하세요 (선택 안 해도 돼요)'));
    const al=div('write-label','나이대');
    const aChips=div('option-chips');
    const ageBtns={};
    ['누구나','20대','30대','20-30대','40대 이상'].forEach(a=>{
      const c=btn(`option-chip${data.ageRange===a?' sel':''}`,a,()=>{
        Object.assign(data,{ageRange:a});
        Object.entries(ageBtns).forEach(([k,b])=>{
          b.className='option-chip'+(k===a?' sel':'');
        });
      });
      ageBtns[a]=c;
      aChips.appendChild(c);
    });
    const gl=div('write-label','성별');
    const gChips=div('option-chips');
    const genderBtns={};
    ['누구나','여성만','남성만'].forEach(g=>{
      const c=btn(`option-chip${data.gender===g?' sel':''}`,g,()=>{
        Object.assign(data,{gender:g});
        Object.entries(genderBtns).forEach(([k,b])=>{
          b.className='option-chip'+(k===g?' sel':'');
        });
      });
      genderBtns[g]=c;
      gChips.appendChild(c);
    });
    ap(stepDiv,al,aChips,gl,gChips);
  } else if(step===3){
    ap(stepDiv,div('write-step-title','나를 소개해주세요'),div('write-step-sub','동행자에게 나와 모임에 대해 알려주세요'));
    const tl=div('write-label','모집 제목');
    const ti=el('input','write-input');ti.placeholder='예) 여의도 벚꽃 같이 봐요 🌸';ti.value=data.title||'';
    ti.oninput=e=>Object.assign(data,{title:e.target.value});
    const dl=div('write-label','상세 소개');
    const ta=el('textarea','write-textarea');ta.placeholder='만남 장소, 일정 계획, 본인 소개 등을 자유롭게 적어주세요.';
    ta.value=data.desc||'';ta.oninput=e=>Object.assign(data,{desc:e.target.value});
    const tagl=div('write-label','태그 (쉼표로 구분)');
    const tagi=el('input','write-input');tagi.placeholder='예) 사진찍기, 피크닉, 혼자참여OK';
    tagi.value=(data.tags||[]).join(', ');tagi.oninput=e=>Object.assign(data,{tags:e.target.value.split(',').map(x=>x.trim()).filter(Boolean)});
    ap(stepDiv,tl,ti,dl,ta,tagl,tagi);
  }

  // 하단 버튼 (모든 단계에 다음 버튼 표시)
  const footer=div('write-footer');
  if(step>0){
    const prev=btn('write-prev-btn','이전',()=>setState({writeStep:step-1}));
    footer.appendChild(prev);
  }
  const isLast=step===steps.length-1;
  const nextBtn=btn('write-next-btn',isLast?'동행 모집 올리기 🎉':'다음',()=>{
    if(isLast){
      const festRef=S.festivals.find(f=>f.id===data.festivalId);
      const newMate={
        id:Date.now(),festivalId:data.festivalId,festName:data.festName,festDate:data.festDate,
        region:festRef?.region||'기타',
        meetDate:data.meetDate||'미정',meetTime:data.meetTime||'미정',
        totalSlots:data.totalSlots||2,filledSlots:1,
        ageRange:data.ageRange||'누구나',gender:data.gender||'누구나',
        carpool:data.carpool||false,costPerPerson:data.costPerPerson||0,
        title:data.title||'동행 구해요',desc:data.desc||'',
        author:'나',authorAge:'25',authorGender:'여',authorColor:'#D16835',
        tags:data.tags||[],status:'open',dday:7,isMe:true,
        applicants:[],chats:[]
      };
      S.mates.unshift(newMate);
      S.notifications.unshift({id:Date.now(),unread:true,ic:'user',ic_c:'#D16835',ic_bg:'#FDF5E6',title:'동행 모집글이 등록됐어요!',desc:newMate.title,time:'방금 전'});
      setState({mateView:null,writeStep:0,writeData:{},chatTab:'동행'});
    } else {
      setState({writeStep:step+1});
    }
  });
  // step 0: 축제 미선택 시 비활성
  if(step===0) nextBtn.disabled=!data.festivalId;
  footer.appendChild(nextBtn);
  ap(page,hdr,progBar,stepDiv,footer);
  return page;
}

function buildMateChat(){
  const roomId=S.chatRoomId;
  if(!S.chatMessages[roomId]) S.chatMessages[roomId]=[];
  const msgs=S.chatMessages[roomId];
  const m=S.mates.find(x=>x.id===parseInt(roomId));
  const partner=m?.applicants.find(a=>a.status==='accepted');

  if(!msgs.length && m && partner){
    msgs.push(
      {id:1,from:'other',name:partner.name,text:'안녕하세요! 동행 신청했어요 😊',time:'오후 1:00',color:partner.color},
      {id:2,from:'mine',text:'반가워요! 당일 여의나루역 2번 출구에서 봬요~',time:'오후 1:01'},
      {id:3,from:'other',name:partner.name,text:'네! 혹시 사진 보정 잘 하세요? 저는 사진 찍는 거 좋아해서요 😄',time:'오후 1:02',color:partner.color},
    );
  }

  const page=div('chat-page');
  if(!S._back) page.classList.add('slide-right');

  /* ── 헤더 (당근 스타일) */
  const hdr=div('');
  css(hdr,{
    paddingTop:'max(env(safe-area-inset-top,44px),44px)',
    padding:'max(env(safe-area-inset-top,44px),44px) 16px 12px',
    background:'#fff',
    borderBottom:'1px solid #f2f3f5',
    display:'flex',alignItems:'center',gap:'10px',
    flexShrink:'0',
  });
  hdr.appendChild(backBtn(()=>goBack({mateView:'detail',chatRoomId:null})));

  // 상대방 아바타 + 이름
  const hAv=div('');
  const pColor=partner?.color||'#868b94';
  css(hAv,{width:'36px',height:'36px',borderRadius:'50%',background:pColor,
    display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'14px',fontWeight:'800',color:'#fff',flexShrink:'0'});
  setText(hAv,(partner?.name||'상대방')[0]);

  const hInfo=div('');css(hInfo,{flex:'1'});
  const hName=div('');css(hName,{fontSize:'15px',fontWeight:'700',color:'#212124'});
  setText(hName,partner?.name||m?.festName||'채팅');
  const hSub=div('');css(hSub,{fontSize:'12px',color:'#868b94',marginTop:'1px'});
  setText(hSub,m?m.festName+' · '+m.meetDate+' 동행':'');
  ap(hInfo,hName,hSub);
  ap(hdr,hAv,hInfo);

  /* ── 채팅 안내 배너 (처음 한 번만) */
  const noticeBanner=div('');
  css(noticeBanner,{
    background:'#f2f3f5',padding:'10px 16px',
    fontSize:'12px',color:'#868b94',textAlign:'center',
    flexShrink:'0',lineHeight:'1.6'
  });
  setText(noticeBanner,`${m?.festName||'축제'} 동행이 확정됐어요 🎉\n서로 개인정보 보호에 유의해 주세요.`);

  /* ── 메시지 바디 */
  const body=div('chat-body');
  css(body,{background:'#fff'});

  function makeBubble(msg){
    const isMe=msg.from==='mine';
    const wrap=div('');
    css(wrap,{
      display:'flex',
      flexDirection:isMe?'row-reverse':'row',
      alignItems:'flex-end',
      gap:'8px',
      marginBottom:'12px',
      padding:'0 16px'
    });

    if(!isMe){
      const av=div('');
      css(av,{width:'32px',height:'32px',borderRadius:'50%',background:msg.color||'#868b94',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'12px',fontWeight:'800',color:'#fff',flexShrink:'0',alignSelf:'flex-start'});
      setText(av,(msg.name||'?')[0]);

      const col=div('');
      const nameEl=div('');
      css(nameEl,{fontSize:'11px',color:'#868b94',marginBottom:'4px',fontWeight:'600'});
      setText(nameEl,msg.name||'');

      const bubble=div('');
      css(bubble,{
        background:'#f2f3f5',color:'#212124',
        borderRadius:'4px 16px 16px 16px',
        padding:'10px 14px',fontSize:'14px',lineHeight:'1.6',
        maxWidth:'68%',wordBreak:'break-word'
      });
      setText(bubble,msg.text);
      ap(col,nameEl,bubble);
      ap(wrap,av,col);
    } else {
      const bubble=div('');
      css(bubble,{
        background:'#FF7E36',color:'#fff',
        borderRadius:'16px 4px 16px 16px',
        padding:'10px 14px',fontSize:'14px',lineHeight:'1.6',
        maxWidth:'68%',wordBreak:'break-word'
      });
      setText(bubble,msg.text);
      wrap.appendChild(bubble);
    }

    const timeEl=div('');
    css(timeEl,{fontSize:'10px',color:'#c2c4c8',flexShrink:'0',alignSelf:'flex-end',marginBottom:'2px'});
    setText(timeEl,msg.time);
    wrap.appendChild(timeEl);
    return wrap;
  }

  msgs.forEach(msg=>body.appendChild(makeBubble(msg)));

  /* ── 입력창 (당근 스타일) */
  const inputBar=div('');
  css(inputBar,{
    display:'flex',alignItems:'center',gap:'8px',
    padding:'10px 14px',
    background:'#fff',
    borderTop:'1px solid #f2f3f5',
    paddingBottom:'max(calc(env(safe-area-inset-bottom,0px)+10px),10px)',
    flexShrink:'0'
  });

  const inp=el('input','');
  inp.placeholder='메시지 보내기';inp.type='text';
  css(inp,{
    flex:'1',padding:'10px 14px',
    borderRadius:'22px',border:'1.5px solid #e5e6eb',
    fontSize:'14px',background:'#f9fafa',outline:'none',
    fontFamily:'inherit',color:'#212124',
    transition:'border-color .15s,background .15s'
  });
  inp.onfocus=()=>css(inp,{borderColor:'#FF7E36',background:'#fff'});
  inp.onblur=()=>css(inp,{borderColor:'#e5e6eb',background:'#f9fafa'});

  const sendB=btn('','',()=>{
    const text=inp.value.trim();
    if(!text) return;
    const now=new Date();
    const hh=now.getHours(),mm=String(now.getMinutes()).padStart(2,'0');
    const newMsg={id:Date.now(),from:'mine',text,
      time:`${hh>11?'오후':'오전'} ${hh>12?hh-12:hh===0?12:hh}:${mm}`};
    msgs.push(newMsg);
    const bubble=makeBubble(newMsg);
    bubble.style.opacity='0';bubble.style.transform='translateY(8px)';
    body.appendChild(bubble);
    requestAnimationFrame(()=>{
      bubble.style.transition='opacity .18s,transform .18s';
      bubble.style.opacity='1';bubble.style.transform='translateY(0)';
    });
    inp.value='';body.scrollTop=body.scrollHeight;inp.focus();
  });
  css(sendB,{
    width:'38px',height:'38px',borderRadius:'50%',border:'none',cursor:'pointer',
    background:'#FF7E36',flexShrink:'0',
    display:'flex',alignItems:'center',justifyContent:'center',
    boxShadow:'0 2px 8px rgba(255,126,54,.35)',
    transition:'transform .12s'
  });
  sendB.addEventListener('pointerdown',()=>css(sendB,{transform:'scale(.9)'}));
  sendB.addEventListener('pointerup',()=>css(sendB,{transform:'scale(1)'}));
  const sendIco=icon('chevRight');
  css(sendIco,{width:'16px',height:'16px',stroke:'#fff',fill:'none',strokeWidth:'2.5',
    strokeLinecap:'round',strokeLinejoin:'round'});
  sendB.appendChild(sendIco);
  inp.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();sendB.click();}};
  ap(inputBar,inp,sendB);

  ap(page,hdr,noticeBanner,body,inputBar);
  requestAnimationFrame(()=>{body.scrollTop=body.scrollHeight;});
  return page;
}

          flex-direction:column;

        slot.style.animationDelay=(i*0.06)+'s';

        const em=div('');css(em,{
          fontSize:'26px',lineHeight:'1',marginBottom:'4px',
          filter:'drop-shadow(0 0 7px rgba(212,160,48,.55))',
          pointerEvents:'none',
        });setText(em,rec.emoji||'🔮');

        const lb=div('');css(lb,{
          fontSize:'8px',fontWeight:'800',letterSpacing:'.04em',
          color:'rgba(212,160,48,.82)',textAlign:'center',
          maxWidth:'52px',overflow:'hidden',
          textOverflow:'ellipsis',whiteSpace:'nowrap',
          pointerEvents:'none',
        });setText(lb,rec.badge||'타로');

        ap(slot,em,lb);
        slot.onmousedown=()=>css(slot,{transform:'scale(.92)'});
        slot.onmouseup=()=>css(slot,{transform:''});
        slot.onclick=()=>showDetail(rec);

      } else if(i===filled && filled<SLOTS){
        // 다음 빈 슬롯
        const plus=div('');css(plus,{fontSize:'20px',color:'rgba(255,255,255,.15)'});
        setText(plus,'+');slot.appendChild(plus);

      } else if(isReward){
        const gift=div('');css(gift,{fontSize:'22px',marginBottom:'3px'});setText(gift,'🎁');
        const glb=div('');css(glb,{fontSize:'8px',fontWeight:'800',
          color:'rgba(212,160,48,.45)',letterSpacing:'.06em'});setText(glb,'보상');
        ap(slot,gift,glb);

      } else {
        const num=div('');css(num,{fontSize:'12px',fontWeight:'700',
          color:'rgba(255,255,255,.1)'});setText(num,String(i+1));
        slot.appendChild(num);
      }
      grid.appendChild(slot);
    }
    card.appendChild(grid);

    // 진행 바
    const pct=Math.round((filled/SLOTS)*100);
    const progRow=div('');css(progRow,{display:'flex',justifyContent:'space-between',marginBottom:'8px'});
    const pl=div('');css(pl,{fontSize:'11px',color:'rgba(255,255,255,.4)',fontWeight:'600'});
    setText(pl,filled+' / '+SLOTS+' 스탬프 수집');
    const pr=div('');css(pr,{fontSize:'11px',color:'rgba(212,160,48,.7)',fontWeight:'700'});
    setText(pr,filled>=SLOTS?'🎁 완성! 보상 수령 가능':(SLOTS-filled)+'개 더 모으면 🎁');
    ap(progRow,pl,pr);
    const progBg=div('');css(progBg,{height:'5px',background:'rgba(255,255,255,.08)',
      borderRadius:'9999px',overflow:'hidden'});
    const progFill=div('');css(progFill,{height:'100%',width:pct+'%',borderRadius:'9999px',
      background:'linear-gradient(90deg,rgba(212,160,48,.45),#d4a030)',
      transition:'width .6s ease'});
    progBg.appendChild(progFill);
    ap(card,progRow,progBg);

    const note=div('');css(note,{fontSize:'10px',color:'rgba(255,255,255,.2)',
      textAlign:'center',marginTop:'14px',paddingTop:'12px',
      borderTop:'1px solid rgba(255,255,255,.07)'});
    setText(note,'✦  9칸 완성 시 나들이 프리미엄 쿠폰 증정  ✦');
    card.appendChild(note);
    scroll.appendChild(card);

    // ── 기록 리스트
    if(filled){
      const lh=div('');css(lh,{fontSize:'14px',fontWeight:'800',color:'#111',
        marginBottom:'12px'});setText(lh,'타로 검사 기록');
      scroll.appendChild(lh);
      history.forEach((rec,i)=>{
        const row=div('');css(row,{background:'#fff',borderRadius:'14px',
          padding:'14px 16px',marginBottom:'8px',
          display:'flex',alignItems:'center',gap:'12px',
          boxShadow:'0 1px 6px rgba(0,0,0,.06)',cursor:'pointer'});
        row.onclick=()=>showDetail(rec);
        const dot=div('');css(dot,{width:'40px',height:'40px',borderRadius:'50%',
          background:'rgba(212,160,48,.08)',border:'2px solid rgba(212,160,48,.25)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'20px',flexShrink:'0'});setText(dot,rec.emoji||'🔮');
        const info=div('');css(info,{flex:'1'});
        const b2=div('');css(b2,{fontSize:'11px',fontWeight:'700',color:'#7c3aed',marginBottom:'1px'});setText(b2,rec.badge||'');
        const t2=div('');css(t2,{fontSize:'14px',fontWeight:'800',color:'#111'});setText(t2,rec.title||'');
        const d2=div('');css(d2,{fontSize:'11px',color:'#94a3b8',marginTop:'1px'});setText(d2,rec.date);
        ap(info,b2,t2,d2);
        const num2=div('');css(num2,{width:'26px',height:'26px',borderRadius:'50%',
          background:'rgba(212,160,48,.1)',border:'1.5px solid rgba(212,160,48,.3)',
          display:'flex',alignItems:'center',justifyContent:'center',
          fontSize:'10px',fontWeight:'800',color:'rgba(212,160,48,.8)',flexShrink:'0'});
        setText(num2,String(i+1).padStart(2,'0'));
        ap(row,dot,info,num2);scroll.appendChild(row);
      });
    }

    // ── 상세 팝업
    function showDetail(rec){
      const ov=div('');css(ov,{position:'fixed',inset:'0',background:'rgba(0,0,0,.55)',
        zIndex:'300',display:'flex',alignItems:'flex-end',justifyContent:'center'});
      ov.onclick=e=>{if(e.target===ov)ov.remove();};
      const sh=div('');css(sh,{background:'linear-gradient(180deg,#1a0a2e,#0d0820)',
        borderRadius:'24px 24px 0 0',width:'100%',maxWidth:'430px',
        padding:'20px 20px 48px',textAlign:'center',
        border:'1px solid rgba(212,160,48,.2)',borderBottom:'none'});
      const hd2=div('');css(hd2,{width:'36px',height:'4px',
        background:'rgba(212,160,48,.3)',borderRadius:'9999px',margin:'0 auto 20px'});
      const sc=div('');css(sc,{width:'110px',height:'110px',borderRadius:'50%',
        margin:'0 auto 14px',background:'rgba(212,160,48,.07)',
        border:'3px solid rgba(212,160,48,.45)',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontSize:'48px',boxShadow:'0 0 24px rgba(212,160,48,.2)'});
      setText(sc,rec.emoji||'🔮');
      const bg2=div('');css(bg2,{fontSize:'12px',fontWeight:'700',color:'rgba(212,160,48,.7)',
        marginBottom:'5px',letterSpacing:'.06em'});setText(bg2,rec.badge||'');
      const tt2=div('');css(tt2,{fontSize:'18px',fontWeight:'900',color:'#fff',
        marginBottom:'4px'});setText(tt2,rec.title||'');
      const dt2=div('');css(dt2,{fontSize:'12px',color:'rgba(255,255,255,.35)',
        marginBottom:'18px'});setText(dt2,rec.date+' 검사');
      const fw=div('');css(fw,{display:'flex',gap:'8px',justifyContent:'center',
        flexWrap:'wrap',marginBottom:'20px'});
      (rec.matched||[]).forEach((f,fi)=>{
        const ranks=['👑 1위','✨ 2위','⭐ 3위'];
        const cp=div('');css(cp,{fontSize:'12px',fontWeight:'700',padding:'6px 12px',
          borderRadius:'9999px',cursor:'pointer',
          background:'rgba(212,160,48,.1)',color:'rgba(212,160,48,.85)',
          border:'1px solid rgba(212,160,48,.25)'});
        setText(cp,(ranks[fi]||fi+1+'위')+' '+f.title);
        cp.onclick=()=>{ov.remove();const fest=S.festivals.find(x=>x.id===f.id);
          if(fest)setState({item:fest,sub:null,showMyTickets:null});};
        fw.appendChild(cp);
      });
      const cl=btn('','닫기',()=>ov.remove());
      css(cl,{width:'100%',padding:'13px',borderRadius:'14px',border:'none',cursor:'pointer',
        fontSize:'14px',fontWeight:'700',background:'rgba(255,255,255,.08)',
        color:'rgba(255,255,255,.6)'});
      ap(sh,hd2,sc,bg2,tt2,dt2,fw,cl);ov.appendChild(sh);page.appendChild(ov);
    }
  }

  ap(page,hdr,scroll);return page;
}

function buildSettingsPage(){
  const page=div('full-list-page');
  if(!S._back) page.classList.add('slide-right');
  const hdr=div('full-list-header');
  ap(hdr,backBtn(()=>goBack({showSettings:false})),div('full-list-title','⚙️ 설정'));
  const scroll=div('full-list-scroll');css(scroll,{background:'#f8f8f6',padding:'16px 20px'});

  // ── 토글 상태 (S.settingsPrefs에 저장)
  if(!S.settingsPrefs) S.settingsPrefs={festAlert:true,mateAlert:true,marketingAlert:false,location:true};

  function makeToggle(label,desc,prefKey){
    const row=div('');css(row,{background:'#fff',borderRadius:'14px',padding:'16px',
      display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'8px',gap:'12px'});
    const info=div('');
    const lbl=div('');css(lbl,{fontSize:'14px',fontWeight:'700',color:'#111',marginBottom:'2px'});setText(lbl,label);
    if(desc){const d=div('');css(d,{fontSize:'12px',color:'#94a3b8'});setText(d,desc);info.appendChild(d);}
    info.insertBefore(lbl,info.firstChild);
    let on=S.settingsPrefs[prefKey];
    const tog=div('');css(tog,{width:'44px',height:'26px',borderRadius:'13px',cursor:'pointer',flexShrink:'0',
      background:on?'#FF6F61':'#e2e8f0',transition:'background .2s',position:'relative'});
    const ball=div('');css(ball,{width:'20px',height:'20px',borderRadius:'50%',background:'#fff',
      position:'absolute',top:'3px',left:on?'21px':'3px',transition:'left .2s',
      boxShadow:'0 1px 4px rgba(0,0,0,.2)'});
    tog.appendChild(ball);
    tog.onclick=()=>{
      on=!on; S.settingsPrefs[prefKey]=on;
      css(tog,{background:on?'#FF6F61':'#e2e8f0'});
      css(ball,{left:on?'21px':'3px'});
    };
    ap(row,info,tog);return row;
  }

  function makeSection(title){
    const s=div('');css(s,{fontSize:'12px',fontWeight:'700',color:'#94a3b8',
      letterSpacing:'.06em',marginBottom:'8px',marginTop:'16px'});setText(s,title);return s;
  }

  // ── 모달 헬퍼
  function showModal(title,content){
    const overlay=div('');css(overlay,{position:'fixed',inset:'0',background:'rgba(0,0,0,.45)',

    const sheet=div('');css(sheet,{background:'#fff',borderRadius:'20px 20px 0 0',

      borderRadius:'9999px',margin:'0 auto 16px'});

    const bod=div('');css(bod,{fontSize:'13px',color:'#374151',lineHeight:'1.8',whiteSpace:'pre-line'});
    setText(bod,content);
    ap(sheet,handle,th,bod);overlay.appendChild(sheet);page.appendChild(overlay);
  }

  // ── 입력 모달
  function showInputModal(title,fields,onSave){
    const overlay=div('');css(overlay,{position:'fixed',inset:'0',background:'rgba(0,0,0,.45)',
      zIndex:'200',display:'flex',alignItems:'flex-end',justifyContent:'center'});

      width:'100%',maxWidth:'430px',padding:'20px 20px 44px'});

      borderRadius:'9999px',margin:'0 auto 16px'});

    const inputs={};

      const lbl=div('');css(lbl,{fontSize:'12px',fontWeight:'700',color:'#64748b',marginBottom:'6px'});setText(lbl,f.label);
      const inp=el('input','');inp.type=f.type||'text';inp.placeholder=f.placeholder||'';inp.value=f.value||'';
      css(inp,{width:'100%',padding:'12px',borderRadius:'10px',border:'1.5px solid #e2e8f0',
        fontSize:'14px',outline:'none',fontFamily:'inherit',marginBottom:'12px',boxSizing:'border-box'});
      inp.onfocus=()=>css(inp,{borderColor:'#FF6F61'});

function buildThemePage(){
  const {n:tn, em, tags, img} = S.selectedTheme;
  const page=div('full-list-page');
  if(!S._back) page.classList.add('slide-right');

  const hdr=div('full-list-header');
  const bk=backBtn(()=>goBack({selectedTheme:null}));
  const ttl=div('full-list-title',(em||'✦')+' '+tn);
  ap(hdr,bk,ttl);

  const scroll=div('full-list-scroll');

  // 날짜 유틸
  const now=new Date();const thisYear=now.getFullYear();
  function parseDate(mmdd){const[m,d]=mmdd.trim().split('.').map(Number);return new Date(thisYear,m-1,d);}
  function parseFestDates(s){const pts=s.split('-');return{start:parseDate(pts[0]),end:parseDate(pts[1]||pts[0])};}
  const MS30=30*24*60*60*1000;
  function congInfo(v){
    if(v>90) return{t:'혼잡',c:'#ef4444',bg:'#fef2f2'};
    if(v>70) return{t:'붐빔',c:'#f59e0b',bg:'#fffbeb'};
    return{t:'여유',c:'#10b981',bg:'#f0fdf4'};
  }
  function statusInfo(f){
    const{start,end}=parseFestDates(f.date);
    if(now>=start&&now<=end) return{t:'진행중',c:'#10b981',bg:'#f0fdf4'};
    if(start>now) return{t:'예정',c:'#7c3aed',bg:'#f5f3ff'};
    return{t:'종료',c:'#94a3b8',bg:'#f8fafc'};
  }

  // 테마 필터 (tag, title, loc 검색)
  const kws=(tags||[tn]).map(t=>t.toLowerCase());
  const matchTheme=f=>{
    const hay=(f.title+f.tag+f.loc+(f.tags||[]).join('')).toLowerCase();
    return kws.some(k=>hay.includes(k));
  };
  const filtered=S.festivals.filter(matchTheme);
  const current=[],upcoming=[],past=[];
  filtered.forEach(f=>{
    const{start,end}=parseFestDates(f.date);
    if(now>=start&&now<=end) current.push(f);
    else if(start>now&&start-now<=MS30) upcoming.push(f);
    else if(end<now&&now-end<=MS30) past.push(f);
  });
  const allFests=[...current,...upcoming,...past];

  // 테마 히어로 배너
  const banner=div('');css(banner,{
    position:'relative',height:'140px',overflow:'hidden',
    background:`url(${img||''}) center/cover no-repeat`,
    marginBottom:'0',
  });
  const bannerOv=div('');css(bannerOv,{
    position:'absolute',inset:'0',
    background:'linear-gradient(to bottom,rgba(0,0,0,.3) 0%,rgba(0,0,0,.6) 100%)',
    display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
  });
  const bannerEm=div('');css(bannerEm,{fontSize:'32px',marginBottom:'6px'});setText(bannerEm,em||'✦');
  const bannerTitle=div('');css(bannerTitle,{fontSize:'20px',fontWeight:'900',color:'#fff',
    letterSpacing:'-.03em',textShadow:'0 2px 8px rgba(0,0,0,.4)'});setText(bannerTitle,tn);
  const bannerCnt=div('');css(bannerCnt,{fontSize:'12px',color:'rgba(255,255,255,.75)',marginTop:'4px'});
  setText(bannerCnt,'축제 '+allFests.length+'개');
  ap(bannerOv,bannerEm,bannerTitle,bannerCnt);
  banner.appendChild(bannerOv);
  scroll.appendChild(banner);

  if(!allFests.length){
    const none=div('');css(none,{textAlign:'center',padding:'60px 20px',color:'#94a3b8',fontSize:'14px'});
    setText(none,'해당 테마 축제가 없어요 😢');
    scroll.appendChild(none);
  } else {
    function renderSec(label,chipBg,chipColor,festivals){
      if(!festivals.length) return;
      const sec=div('');css(sec,{padding:'0 20px',marginBottom:'28px'});
      const hd=div('');css(hd,{display:'flex',alignItems:'center',gap:'8px',marginBottom:'14px',paddingTop:'20px'});
      const chip=div('');css(chip,{fontSize:'11px',fontWeight:'800',letterSpacing:'.05em',
        padding:'4px 12px',borderRadius:'9999px',background:chipBg,color:chipColor});setText(chip,label);
      const cnt=div('');css(cnt,{fontSize:'12px',color:'#94a3b8',fontWeight:'600'});
      setText(cnt,festivals.length+'개');
      ap(hd,chip,cnt);sec.appendChild(hd);

      festivals.forEach(f=>{
        const st=statusInfo(f);const ct=congInfo(f.cong||50);
        const card=div('');css(card,{background:'#fff',borderRadius:'20px',overflow:'hidden',
          marginBottom:'16px',cursor:'pointer',boxShadow:'0 2px 16px rgba(0,0,0,.07)'});
        card.onclick=()=>setState({item:f,sub:null});

        const imgWrap=div('');css(imgWrap,{position:'relative',overflow:'hidden'});
        const fimg=el('img','');fimg.src=f.img;fimg.alt=f.title;
        css(fimg,{width:'100%',height:'180px',objectFit:'cover',display:'block'});
        fimg.onerror=()=>{css(imgWrap,{height:'180px',background:'#f1f5f9',display:'flex',
          alignItems:'center',justifyContent:'center',fontSize:'32px'});setText(imgWrap,'🎪');};
        const stChip=div('');css(stChip,{position:'absolute',top:'12px',left:'12px',
          padding:'4px 10px',borderRadius:'9999px',fontSize:'11px',fontWeight:'800',
          background:st.bg,color:st.c,border:`1px solid ${st.c}30`});setText(stChip,st.t);
        imgWrap.appendChild(fimg);imgWrap.appendChild(stChip);

        const info=div('');css(info,{padding:'16px 16px 14px'});
        const titleEl=div('');css(titleEl,{fontSize:'16px',fontWeight:'800',color:'#111',
          marginBottom:'6px',lineHeight:'1.3',letterSpacing:'-.02em'});setText(titleEl,f.title);
        const metaRow=div('');css(metaRow,{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'});
        const dateEl=div('');css(dateEl,{fontSize:'12px',color:'#64748b'});setText(dateEl,'📅 '+f.date);
        const locEl=div('');css(locEl,{fontSize:'12px',color:'#94a3b8'});setText(locEl,'· '+f.loc);
        ap(metaRow,dateEl,locEl);

        const chipRow=div('');css(chipRow,{display:'flex',gap:'7px',alignItems:'center'});
        const congChip=div('');css(congChip,{fontSize:'11px',fontWeight:'700',padding:'5px 11px',
          borderRadius:'9999px',background:ct.bg,color:ct.c});setText(congChip,ct.t);
        const ratingEl=div('');css(ratingEl,{fontSize:'11px',fontWeight:'700',color:'#f59e0b',
          padding:'5px 11px',borderRadius:'9999px',background:'#fffbeb'});setText(ratingEl,'★ '+(f.rating||4.5));
        const detailBtn=div('');css(detailBtn,{marginLeft:'auto',fontSize:'12px',fontWeight:'700',
          color:'#FF6F61',padding:'5px 13px',borderRadius:'9999px',border:'1.5px solid #FF6F61',cursor:'pointer'});
        setText(detailBtn,'상세보기');
        detailBtn.onclick=(e)=>{e.stopPropagation();setState({item:f,sub:null});};
        ap(chipRow,congChip,ratingEl,detailBtn);
        ap(info,titleEl,metaRow,chipRow);ap(card,imgWrap,info);
        sec.appendChild(card);
      });
      scroll.appendChild(sec);
    }

    renderSec('● 진행중','#f0fdf4','#10b981',current);
    renderSec('◆ 예정','#f5f3ff','#7c3aed',upcoming);
    renderSec('종료','#f8fafc','#94a3b8',past);
  }

  ap(page,hdr,scroll);
  return page;
}

  const ttl=div('full-list-title',em+' '+rn+' 축제');
  ap(hdr,bk,ttl);

  const scroll=div('full-list-scroll');

  // 날짜 유틸
  const now=new Date();const thisYear=now.getFullYear();
  function parseDate(mmdd){const[m,d]=mmdd.trim().split('.').map(Number);return new Date(thisYear,m-1,d);}
  function parseFestDates(s){const pts=s.split('-');return{start:parseDate(pts[0]),end:parseDate(pts[1]||pts[0])};}
  const regionMap={'경기/인천':['경기','인천'],'경상':['경북','경남','대구','울산','부산'],'전라':['전북','전남','광주'],'충청':['충북','충남','대전','세종']};
  const MS30=30*24*60*60*1000;
  function congInfo(v){
    if(v>90) return{t:'혼잡',c:'#ef4444',bg:'#fef2f2'};
    if(v>70) return{t:'붐빔',c:'#f59e0b',bg:'#fffbeb'};
    return{t:'여유',c:'#10b981',bg:'#f0fdf4'};
  }

  const matchR=f=>{
    if(rn==='내 주변') return true;
    const aliases=regionMap[rn]||[rn];
    return aliases.some(a=>(f.region&&f.region.includes(a))||(f.loc&&f.loc.includes(a)));
  };
  const filtered=S.festivals.filter(matchR);
  const current=[],upcoming=[],past=[];
  filtered.forEach(f=>{
    const{start,end}=parseFestDates(f.date);
    if(now>=start&&now<=end) current.push(f);
    else if(start>now&&start-now<=MS30) upcoming.push(f);
    else if(end<now&&now-end<=MS30) past.push(f);
  });

  function statusInfo(f){
    const{start,end}=parseFestDates(f.date);
    if(now>=start&&now<=end) return{t:'진행중',c:'#10b981',bg:'#f0fdf4'};
    if(start>now) return{t:'예정',c:'#7c3aed',bg:'#f5f3ff'};
    return{t:'종료',c:'#94a3b8',bg:'#f8fafc'};
  }

  const allFests=[...current,...upcoming,...past];

  if(!allFests.length){
    const none=div('');css(none,{textAlign:'center',padding:'60px 20px',color:'#94a3b8',fontSize:'14px'});
    setText(none,'해당 지역 축제가 없어요 😢');
    scroll.appendChild(none);
  } else {
    function renderSec(label,chipBg,chipColor,festivals){
      if(!festivals.length) return;
      const sec=div('');css(sec,{padding:'0 20px',marginBottom:'28px'});
      const hd=div('');css(hd,{display:'flex',alignItems:'center',gap:'8px',marginBottom:'14px',paddingTop:'20px'});
      const chip=div('');css(chip,{
        fontSize:'11px',fontWeight:'800',letterSpacing:'.05em',
        padding:'4px 12px',borderRadius:'9999px',
        background:chipBg,color:chipColor,
      });setText(chip,label);
      const cnt=div('');css(cnt,{fontSize:'12px',color:'#94a3b8',fontWeight:'600'});
      setText(cnt,festivals.length+'개');
      ap(hd,chip,cnt);sec.appendChild(hd);

      festivals.forEach(f=>{
        const st=statusInfo(f);
        const ct=congInfo(f.cong||50);
        const card=div('');css(card,{
          background:'#fff',borderRadius:'20px',overflow:'hidden',
          marginBottom:'16px',cursor:'pointer',
          boxShadow:'0 2px 16px rgba(0,0,0,.07)',
        });
        card.onclick=()=>setState({item:f,sub:null});

        const imgWrap=div('');css(imgWrap,{position:'relative',overflow:'hidden'});
        const img=el('img','');img.src=f.img;img.alt=f.title;
        css(img,{width:'100%',height:'180px',objectFit:'cover',display:'block'});
        img.onerror=()=>{css(imgWrap,{height:'180px',background:'#f1f5f9',display:'flex',
          alignItems:'center',justifyContent:'center',fontSize:'32px'});setText(imgWrap,'🎪');};
        const stChip=div('');css(stChip,{
          position:'absolute',top:'12px',left:'12px',
          padding:'4px 10px',borderRadius:'9999px',
          fontSize:'11px',fontWeight:'800',
          background:st.bg,color:st.c,
          border:`1px solid ${st.c}30`,
        });setText(stChip,st.t);
        imgWrap.appendChild(img);imgWrap.appendChild(stChip);

        const info=div('');css(info,{padding:'16px 16px 14px'});
        const titleEl=div('');css(titleEl,{fontSize:'16px',fontWeight:'800',color:'#111',
          marginBottom:'6px',lineHeight:'1.3',letterSpacing:'-.02em'});setText(titleEl,f.title);
        const metaRow=div('');css(metaRow,{display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px'});
        const dateEl=div('');css(dateEl,{fontSize:'12px',color:'#64748b'});setText(dateEl,'📅 '+f.date);
        const locEl=div('');css(locEl,{fontSize:'12px',color:'#94a3b8'});setText(locEl,'· '+f.loc);
        ap(metaRow,dateEl,locEl);

        const chipRow=div('');css(chipRow,{display:'flex',gap:'7px',alignItems:'center'});
        const congChip=div('');css(congChip,{fontSize:'11px',fontWeight:'700',
          padding:'5px 11px',borderRadius:'9999px',background:ct.bg,color:ct.c});setText(congChip,ct.t);
        const ratingEl=div('');css(ratingEl,{fontSize:'11px',fontWeight:'700',color:'#f59e0b',
          padding:'5px 11px',borderRadius:'9999px',background:'#fffbeb'});setText(ratingEl,'★ '+(f.rating||4.5));
        const detailBtn=div('');css(detailBtn,{
          marginLeft:'auto',fontSize:'12px',fontWeight:'700',color:'#FF6F61',
          padding:'5px 13px',borderRadius:'9999px',
          border:'1.5px solid #FF6F61',cursor:'pointer',
        });setText(detailBtn,'상세보기');
        detailBtn.onclick=(e)=>{e.stopPropagation();setState({item:f,sub:null});};
        ap(chipRow,congChip,ratingEl,detailBtn);

        ap(info,titleEl,metaRow,chipRow);ap(card,imgWrap,info);
        sec.appendChild(card);
      });
      scroll.appendChild(sec);
    }

    renderSec('● 진행중','#f0fdf4','#10b981',current);
    renderSec('◆ 예정','#f5f3ff','#7c3aed',upcoming);
    renderSec('종료','#f8fafc','#94a3b8',past);
  }

  ap(page,hdr,scroll);
  return page;
}

  ap(page,hdr,scroll);

}

// ─── DNA Quiz Modal ───────────────────────────────────────────────────────────
function buildDnaModal(){
  const BRAND='#FF7E36';
  const modal=div('dna-modal');

  /* ── 헤더 */
  const head=div('dna-modal-head');
  const topRow=div('');
  css(topRow,{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'});
  const leftRow=div('');css(leftRow,{display:'flex',alignItems:'center',gap:'8px'});
  // 뒤로가기 버튼 (placeholder — step 0에서는 숨김)
  const prevBtn=btn('','',()=>goPrev());
  css(prevBtn,{width:'32px',height:'32px',borderRadius:'50%',border:'1px solid #e5e6eb',
    background:'#fff',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',
    fontSize:'14px',flexShrink:'0'});
  setText(prevBtn,'‹');
  leftRow.appendChild(prevBtn);
  const qNum=div('dna-q-num','');
  leftRow.appendChild(qNum);
  const cb=closeBtn(()=>{
    if(step===0){
      // 설문 첫 장에서 X → 히스토리 정리 후 홈으로
      history.replaceState(null,'',location.href);
      setState({showDna:false,dnaStep:0,dnaAnswers:[]});
    } else {
      goBack({showDna:false,dnaStep:0,dnaAnswers:[]});
    }
  });
  ap(topRow,leftRow,cb);
  const prog=div('dna-progress');
  const fill=div('dna-progress-fill');
  prog.appendChild(fill);
  ap(head,topRow,prog);

  const viewport=div('');
  css(viewport,{flex:'1',overflow:'hidden',position:'relative'});
  ap(modal,head,viewport);

  let step=S.dnaStep;
  let answers=[...S.dnaAnswers];

  function updateHead(s){
    setText(qNum,`${s+1} / ${DNA_QUIZ.length}`);
    css(fill,{width:`${Math.round(((s)/DNA_QUIZ.length)*100)}%`});
    // 첫 단계면 뒤로가기 숨김
    css(prevBtn,{visibility:s===0?'hidden':'visible'});
  }

  function makeSlide(s){
    const q=DNA_QUIZ[s];
    const slide=div('');
    css(slide,{position:'absolute',top:'0',left:'0',width:'100%',height:'100%',
      overflowY:'auto',padding:'0 20px 100px',willChange:'transform'});

    /* 마스코트 */
    const mascotWrap=div('');
    css(mascotWrap,{display:'flex',alignItems:'center',gap:'10px',
      background:'rgba(36,14,72,.08)',borderRadius:'12px',padding:'11px 14px',marginBottom:'18px',
      border:'1px solid rgba(212,160,48,.25)'});
    const mIco=div('');css(mIco,{fontSize:'20px',flexShrink:'0'});setText(mIco,'🔮');
    const mTxt=div('');css(mTxt,{fontSize:'13px',color:'rgba(74,29,138,.85)',fontWeight:'600',lineHeight:'1.5',fontStyle:'italic'});
    setText(mTxt,q.mascot);
    ap(mascotWrap,mIco,mTxt);

    /* 질문 */
    const qText=div('');
    css(qText,{fontSize:'19px',fontWeight:'800',color:'#1a0840',
      lineHeight:'1.45',marginBottom:q.hint?'6px':'18px',letterSpacing:'-.03em'});
    setText(qText,q.q);
    ap(slide,mascotWrap,qText);

    if(q.hint){
      const hint=div('');
      css(hint,{fontSize:'12px',color:'#868b94',marginBottom:'14px'});
      setText(hint,'※ '+q.hint);slide.appendChild(hint);
    }

    /* 저장된 답변 */
    const savedAns=answers.find(a=>a.s===s);
    let selected=savedAns?(Array.isArray(savedAns.val)?[...savedAns.val]:[savedAns.val]):[];
    const btnRefs={};

    /* 선택지 — 위치(0번) : 2열 그리드 / 나머지: 1열 */
    const isGrid=s===0||s===1||s===5||s===6;
    const choiceWrap=div('');
    css(choiceWrap,isGrid
      ?{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px'}
      :{display:'flex',flexDirection:'column',gap:'10px'}
    );

    function applySelStyle(el, on){
      css(el,{
        borderColor:on?'rgba(74,29,138,.65)':'rgba(212,160,48,.2)',
        background:on?'rgba(74,29,138,.07)':'#fff',
        color:on?'#3b0f7a':'#212124',
        fontWeight:on?'700':'500',
        boxShadow:on?'0 0 0 1.5px rgba(74,29,138,.45)':'0 1px 3px rgba(0,0,0,.04)',
      });
    }

    q.choices.forEach((c,i)=>{
      const isSel=selected.includes(i);
      const b=btn('',c,()=>{
        if(q.multi){
          // 복수선택은 토글만, 버튼으로 확인
          selected=selected.includes(i)?selected.filter(x=>x!==i):[...selected,i];
          Object.entries(btnRefs).forEach(([k,el])=>applySelStyle(el,selected.includes(Number(k))));
          if(confirmBtn) {
            const on=selected.length>0;
            css(confirmBtn,{background:on?'rgba(74,29,138,.88)':'#e5e6eb',color:on?'#fff':'#adb5bd',boxShadow:on?'0 6px 20px rgba(74,29,138,.3)':'none'});
            confirmBtn.disabled=!on;
          }
        } else {
          // 단일선택: 선택 즉시 다음으로
          selected=[i];
          Object.entries(btnRefs).forEach(([k,el])=>applySelStyle(el,Number(k)===i));
          // 선택 피드백 보여준 뒤 0.22초 후 자동 이동
          const rec={s,val:i};
          const ei=answers.findIndex(a=>a.s===s);
          if(ei>=0) answers[ei]=rec; else answers.push(rec);
          setTimeout(()=>goNext(), 220);
        }
      });
      css(b,{
        padding:isGrid?'12px 8px':'14px 16px',
        borderRadius:'12px',
        border:'1.5px solid '+(isSel?'rgba(74,29,138,.65)':'rgba(212,160,48,.2)'),
        background:isSel?'rgba(74,29,138,.07)':'#fff',
        fontSize:isGrid?'13px':'14px',fontWeight:isSel?'700':'500',
        color:isSel?'#3b0f7a':'#212124',
        textAlign:'center',cursor:'pointer',
        display:'block',width:'100%',
        boxShadow:isSel?'0 0 0 1.5px rgba(74,29,138,.45)':'0 1px 3px rgba(0,0,0,.04)',
        transition:'border-color .12s,background .12s',
        lineHeight:'1.4',
      });
      b.addEventListener('pointerdown',()=>css(b,{transform:'scale(.97)'}));
      b.addEventListener('pointerup',()=>css(b,{transform:'scale(1)'}));
      btnRefs[i]=b;choiceWrap.appendChild(b);
    });
    slide.appendChild(choiceWrap);

    // 복수선택(스타일 문항)만 확인 버튼 표시
    let confirmBtn=null;
    if(q.multi){
      const hasAns=selected.length>0;
      confirmBtn=btn('','선택 완료 →',()=>{
        if(selected.length===0) return;
        const rec={s,val:selected};
        const ei=answers.findIndex(a=>a.s===s);
        if(ei>=0) answers[ei]=rec; else answers.push(rec);
        goNext();
      });
      css(confirmBtn,{
        position:'sticky',bottom:'16px',width:'100%',padding:'15px 0',marginTop:'20px',
        borderRadius:'9999px',border:'none',cursor:'pointer',
        background:hasAns?'#212124':'#e5e6eb',
        color:hasAns?'#fff':'#adb5bd',
        fontSize:'15px',fontWeight:'700',
        boxShadow:hasAns?'0 6px 20px rgba(33,33,36,.2)':'none',
        transition:'background .15s,box-shadow .15s',
      });
      confirmBtn.disabled=!hasAns;
      slide.appendChild(confirmBtn);
    }
    return slide;
  }

  /* ── 실제 축제 매칭 알고리즘 */
  function calcScore(){
    const get=s=>{const a=answers.find(x=>x.s===s);return a?a.val:null;};
    // 16개 유형 점수 초기화
    const sc={A:0,B:0,C:0,D:0,E:0,F:0,G:0,H:0,I:0,J:0,K:0,L:0,M:0,N:0,O:0,P:0};
    // Q1 위치
    const loc=get(0);
    if(loc===0){sc.N+=3;sc.C+=2;}                          // 내 주변 → 도보힐링/힐링다랑이
    else if(loc===1||loc===2){sc.A+=2;sc.B+=1;sc.E+=1;}   // 서울·경기 → 열정/공연/감성
    else if(loc===3){sc.A+=1;sc.O+=2;}                     // 인천 → 동행모임
    else if(loc===4){sc.C+=3;sc.D+=2;}                     // 강원 → 힐링/낭만
    else if(loc===5){sc.H+=2;sc.G+=2;}                     // 충청 → 전통/식도락
    else if(loc===6){sc.G+=2;sc.H+=2;sc.D+=1;}            // 경상 → 식도락/전통
    else if(loc===7){sc.G+=2;sc.D+=2;}                     // 전라 → 식도락/낭만
    else if(loc===8){sc.C+=3;sc.F+=2;sc.L+=1;}            // 제주 → 힐링/야경/커플
    else if(loc===9){sc.M+=3;sc.J+=2;sc.O+=1;}            // 전국 → 원정대/경험수집
    // Q2 나이
    const age=get(1);
    if(age===0){sc.A+=2;sc.B+=1;sc.J+=2;}
    else if(age===1){sc.A+=1;sc.E+=2;sc.O+=2;sc.B+=1;}
    else if(age===2){sc.E+=1;sc.L+=2;sc.G+=1;sc.P+=1;}
    else if(age===3){sc.K+=3;sc.I+=2;sc.H+=1;}
    else if(age===4){sc.K+=2;sc.C+=2;sc.H+=2;sc.N+=2;}
    // Q3 성별
    const gender=get(2);
    if(gender===0){sc.A+=1;sc.M+=1;}
    else if(gender===1){sc.E+=1;sc.L+=1;sc.F+=1;}
    // Q4 인원
    const group=get(3);
    if(group===0){sc.C+=3;sc.N+=2;sc.E+=1;}              // 혼자 → 힐링/도보/감성
    else if(group===1){sc.L+=2;sc.E+=2;sc.O+=1;}         // 2~4명 → 커플/감성/동행
    else{sc.A+=2;sc.K+=2;sc.O+=2;}                        // 5명+ → 열정/가족/동행
    // Q5 동행
    const comp=get(4);
    if(comp===0){sc.O+=4;sc.A+=2;}                        // 나들이go 동행
    else if(comp===1){sc.K+=4;sc.I+=1;}                   // 가족
    else if(comp===2){sc.L+=3;sc.E+=2;sc.F+=1;}           // 연인/친구
    else{sc.C+=3;sc.N+=2;sc.E+=1;}                        // 혼자
    // Q6 스타일 복수선택
    const raw=get(5);
    const styles=Array.isArray(raw)?raw:(raw!=null?[raw]:[]);
    styles.forEach(i=>{
      if(i===0){sc.A+=3;sc.J+=2;sc.M+=1;}               // 활동
      else if(i===1){sc.C+=3;sc.D+=2;sc.N+=1;}           // 여유
      else if(i===2){sc.E+=4;sc.F+=3;sc.L+=1;}           // 인생샷
      else if(i===3){sc.G+=4;sc.I+=2;}                   // 맛집
      else if(i===4){sc.B+=4;sc.A+=1;sc.J+=1;}           // 공연
      else if(i===5){sc.H+=4;sc.D+=1;}                   // 전통
    });
    // Q7 이동수단
    const trans=get(6);
    if(trans===0){sc.M+=3;sc.K+=1;}                       // 자가용
    else if(trans===1){sc.M+=2;sc.H+=1;sc.P+=1;}          // 기차
    else if(trans===2){sc.I+=2;sc.H+=1;}                  // 버스
    else if(trans===3){sc.A+=1;sc.B+=1;sc.E+=1;}          // 지하철
    else{sc.N+=3;sc.C+=1;}                                 // 도보
    // Q8 예산
    const budget=get(7);
    if(budget===0){sc.I+=3;sc.N+=2;sc.C+=1;}             // 무료~3만
    else if(budget===1){sc.I+=2;sc.G+=1;sc.H+=1;}         // 3~5만
    else if(budget===2){sc.J+=2;sc.E+=1;sc.L+=1;}         // 5~10만
    else{sc.M+=2;sc.J+=2;sc.B+=1;}                        // 10만+
    return sc;
  }

  function matchFestivals(){
    const get=s=>{const a=answers.find(x=>x.s===s);return a?a.val:null;};
    const location=get(0);
    const raw=get(5);
    const styles=Array.isArray(raw)?raw:(raw!=null?[raw]:[]);
    const regionMap={1:'서울',2:'경기',3:'인천',4:'강원',5:'충청',6:'경상',7:'전라',8:'제주'};
    const preferRegion=regionMap[location]||null;
    const styleKeys=['활동','여유','인생샷','맛집','공연','전통'];
    const preferStyles=styles.map(i=>styleKeys[i]||'');
    const budget=get(7)??0;
    const scored=S.festivals.map(f=>{
      let sc2=0;
      if(location===0||location===9) sc2+=1;
      else if(preferRegion&&f.region?.includes(preferRegion.slice(0,2))) sc2+=5;
      if(preferStyles.includes('활동')&&f.cong>60) sc2+=3;
      if(preferStyles.includes('여유')&&f.cong<50) sc2+=3;
      if(preferStyles.includes('인생샷')&&(f.tag?.includes('벚꽃')||f.tag?.includes('빛'))) sc2+=4;
      if(preferStyles.includes('맛집')&&(f.tag?.includes('머드')||f.tag?.includes('치맥'))) sc2+=4;
      if(preferStyles.includes('전통')&&f.tag?.includes('전통')) sc2+=5;
      if(preferStyles.includes('공연')&&f.cong>70) sc2+=3;
      if(budget<=1&&f.cong<50) sc2+=2;

          border:`1px solid ${cc2>0?'rgba(124,58,237,.25)':'rgba(156,163,175,.18)'}`,
          padding:'3px 10px',borderRadius:'9999px'});
        setText(cp,'🚗 카풀 '+(cc2>0?cc2+'명':'없음'));
        const mp=div('');css(mp,{fontSize:'12px',fontWeight:'700',
          color:mc2>0?CORAL:'#9ca3af',
          background:mc2>0?'rgba(255,92,92,.08)':'rgba(156,163,175,.07)',
          border:`1px solid ${mc2>0?'rgba(255,92,92,.25)':'rgba(156,163,175,.18)'}`,
          padding:'3px 10px',borderRadius:'9999px'});
        setText(mp,'🤝 동행 '+(mc2>0?mc2+'팀':'없음'));
        ap(chipR,cp,mp);
        // 축제 특징
        const tagDescMap={
          '벚꽃명소':'🌸 봄 벚꽃 절정 시즌 · 연인·친구와 함께 나들이 추천 · 야간 조명도 아름다워요',
          '여름축제':'🌊 짜릿한 여름 액티비티 · 가족·친구 그룹에 딱 · 야외 먹거리존도 풍성해요',
          '전통문화':'🏯 한국 전통 공연과 체험 · 역사 좋아하는 분께 강추 · 사진 명소도 가득해요',
        };
        const festDesc=tagDescMap[f?.tag]||('✦ '+f?.region+' 대표 축제 · 다양한 체험 프로그램 운영 · 현지 먹거리와 특산물도 즐겨보세요');
        const ftag=div('');css(ftag,{fontSize:'12px',color:'#6b7280',lineHeight:'1.65',flex:'1'});
        setText(ftag,festDesc);
        ap(fb,db,ft,dDate,chipR,ftag);
        innerFrame.appendChild(fb);
        front.appendChild(innerFrame);
        ap(flip,back,front);return flip;
      }

      for(let jj=matched.length-1;jj>=0;jj--){
        const c=mkCard(matched[jj]||{title:'축제',loc:'',rating:'',cong:50,img:'',date:''},jj);
        cardEls2[jj]=c;deckWrap2.appendChild(c);
      }

      const swHint2=div('');css(swHint2,{textAlign:'center',fontSize:'11px',color:'#9ca3af',
        marginBottom:'6px',fontStyle:'italic',fontFamily:'Georgia,serif'});
      setText(swHint2,'카드를 탭해서 하나씩 공개하세요 ✦');
      const dotsW2=div('');css(dotsW2,{display:'flex',gap:'6px',justifyContent:'center'});
      const dotEls=matched.map((_,i)=>{
        const d=div('');css(d,{width:i===0?'20px':'8px',height:'8px',borderRadius:'9999px',
          background:i===0?CORAL:'rgba(255,92,92,.22)',transition:'all .3s'});
        dotsW2.appendChild(d);return d;
      });

      function flipC2(idx){
        const ce=cardEls2[idx];if(!ce) return;
        css(ce.children[0],{transform:'rotateY(-180deg)',transition:'transform .65s cubic-bezier(.4,0,.2,1)'});
        css(ce.children[1],{transform:'rotateY(0deg)',transition:'transform .65s cubic-bezier(.4,0,.2,1)'});
        dotEls.forEach((d,i)=>css(d,{width:i<=idx?'20px':'8px',background:i<=idx?CORAL:'rgba(255,92,92,.22)'}));
      }

      function spreadAll2(){
        setText(swHint2,'← 좌우로 돌려서 카드 순서를 바꿔보세요 🎴');
        css(deckWrap2,{height:'320px',marginBottom:'20px',transition:'height .5s cubic-bezier(.4,0,.2,1)'});
        css(dotsW2,{display:'none'});

        const fanAngles=[-14,0,14];
        const fanX=[-85,0,85];
        const fanY=[18,0,18];
        const fanScale=0.72;

        // 현재 순서를 추적하는 배열 (인덱스 기준)
        let fanOrder=[0,1,2]; // fanOrder[0]=좌, [1]=중, [2]=우
        if(S._dnaFanOrder){fanOrder=[...S._dnaFanOrder];S._dnaFanOrder=null;}

        const rankBadges=['👑 1위','✨ 2위','⭐ 3위'];
        const rankColors=[CORAL,'rgba(212,160,48,.9)','rgba(180,180,180,.85)'];

        function applyFan(animated){
          fanOrder.forEach((cardIdx,pos)=>{
            const ce=cardEls2[cardIdx]; if(!ce) return;
            const angle=fanAngles[pos]||0;
            const tx=fanX[pos]||0;
            const ty=fanY[pos]||0;
            css(ce,{
              position:'absolute',width:CW2+'px',height:CH2+'px',
              transform:`translateX(${tx}px) translateY(${ty}px) rotate(${angle}deg) scale(${fanScale})`,
              transition:animated?`transform .5s cubic-bezier(.4,0,.2,1)`:'none',
              zIndex:pos===1?3:2,cursor:'pointer',transformOrigin:'bottom center',
            });
            // 순위 배지 갱신
            let rb=ce.querySelector('.fan-rank-badge');
            if(!rb){
              rb=div('fan-rank-badge');
              css(rb,{
                position:'absolute',top:'-28px',left:'50%',
                transform:'translateX(-50%)',
                fontSize:'13px',fontWeight:'900',
                whiteSpace:'nowrap',pointerEvents:'none',
                textShadow:'0 1px 6px rgba(0,0,0,.4)',
                transition:'opacity .3s',
              });
              ce.appendChild(rb);
            }
            setText(rb,rankBadges[cardIdx]);
            css(rb,{color:rankColors[cardIdx],opacity:animated?'0':'1'});
            if(animated) setTimeout(()=>css(rb,{opacity:'1'}),400+pos*80);
          });
        }

        applyFan(true);

        // 카드 탭 → 상세보기
        matched.forEach((f,i)=>{
          const ce=cardEls2[i]; if(!ce) return;
          ce.onclick=()=>{
            const fest=S.festivals.find(x=>x.id===f.id);
            if(fest){
              S._dnaResultReady=true;
              S._dnaFlippedCount=curCard2;
              S._dnaSpread=(revC2>=matched.length);
              S._dnaClickedCard=i;
              setState({item:fest,sub:null,showDna:false});
            }
          };
          ce.onpointerenter=()=>{
            const pos=fanOrder.indexOf(i);
            const tx=fanX[pos]||0,ty=fanY[pos]||0,angle=fanAngles[pos]||0;
            css(ce,{transform:`translateX(${tx}px) translateY(${ty-18}px) rotate(${angle}deg) scale(${fanScale+.04})`,boxShadow:rsh2[0],zIndex:'10'});
          };
          ce.onpointerleave=()=>{
            const pos=fanOrder.indexOf(i);
            const tx=fanX[pos]||0,ty=fanY[pos]||0,angle=fanAngles[pos]||0;
            css(ce,{transform:`translateX(${tx}px) translateY(${ty}px) rotate(${angle}deg) scale(${fanScale})`,boxShadow:rsh2[pos],zIndex:pos===1?3:2});
          };
        });

        // 스와이프 → 순서 회전
        let fsx=0;
        deckWrap2.addEventListener('touchstart',e=>{fsx=e.touches[0].clientX;},{passive:true});
        deckWrap2.addEventListener('touchend',e=>{
          const dx=e.changedTouches[0].clientX-fsx;
          if(Math.abs(dx)<40) return;
          if(dx<0){
            // 왼쪽 스와이프 → 시계방향 (우측 카드가 중앙으로)
            fanOrder=[fanOrder[1],fanOrder[2],fanOrder[0]];
          } else {
            // 오른쪽 스와이프 → 반시계방향 (좌측 카드가 중앙으로)
            fanOrder=[fanOrder[2],fanOrder[0],fanOrder[1]];
          }
          applyFan(true);
          const centerFest=matched[fanOrder[1]];
          setText(swHint2,centerFest?`✦ ${centerFest.title} — 탭하면 상세보기`:'← 좌우로 돌려보세요 🎴');
        },{passive:true});

        // 마우스 드래그도 지원
        let msx=0,mDragging=false;
        deckWrap2.addEventListener('mousedown',e=>{msx=e.clientX;mDragging=true;});
        deckWrap2.addEventListener('mouseup',e=>{
          if(!mDragging) return; mDragging=false;
          const dx=e.clientX-msx;
          if(Math.abs(dx)<40) return;
          if(dx<0) fanOrder=[fanOrder[1],fanOrder[2],fanOrder[0]];
          else fanOrder=[fanOrder[2],fanOrder[0],fanOrder[1]];
          applyFan(true);
          const centerFest=matched[fanOrder[1]];
          setText(swHint2,centerFest?`✦ ${centerFest.title} — 탭하면 상세보기`:'← 좌우로 돌려보세요 🎴');
        });
      }

      let revC2=0;
      function handleTap2(idx){
        if(idx!==curCard2) return;
        if(curCard2>0){const p=cardEls2[curCard2-1];if(p) css(p,{transform:'scale(.88) translateY(18px)',zIndex:'1',transition:'transform .4s cubic-bezier(.4,0,.2,1)'});}
        css(cardEls2[idx],{transform:'scale(1) translateY(0)',zIndex:'10',transition:'transform .5s cubic-bezier(.4,0,.2,1)'});
        setTimeout(()=>flipC2(idx),80);revC2++;curCard2++;
        if(curCard2<matched.length) setText(swHint2,`${curCard2+1}번 카드를 탭해보세요 ✦`);
        else setTimeout(()=>spreadAll2(),800);
      }
      // 뒷면(back)만 탭 시 넘기기 — 앞면 클릭은 각 버튼이 처리
      cardEls2.forEach((c,i)=>{
        const back=c.children[0];
        if(back) back.addEventListener('click',()=>handleTap2(i));
      });
      let tx0b=0;
      deckWrap2.addEventListener('touchstart',e=>{tx0b=e.touches[0].clientX;},{passive:true});
      deckWrap2.addEventListener('touchend',e=>{
        const dx=Math.abs(e.changedTouches[0].clientX-tx0b);
        if(dx>40) handleTap2(curCard2);
      },{passive:true});
      recSec.appendChild(deckWrap2);recSec.appendChild(swHint2);recSec.appendChild(dotsW2);

      // ④ 궁합 (다크 타로)
      // ─────────────────────────────────────────
      const cmpSec=div('');
      css(cmpSec,{background:`linear-gradient(155deg,${PUR_BG},${PUR_MID})`,
        margin:'12px 16px',borderRadius:'22px',padding:'18px 16px',
        boxShadow:`0 0 28px rgba(255,92,92,.15),0 8px 24px rgba(0,0,0,.22)`,
        border:'2px solid rgba(212,160,48,.42)',position:'relative',overflow:'hidden'});
      const cBorder=document.createElementNS('http://www.w3.org/2000/svg','svg');
      cBorder.setAttribute('width','100%');cBorder.setAttribute('height','100%');
      cBorder.style.cssText='position:absolute;inset:0;pointer-events:none';
      cBorder.innerHTML=`<rect x="5" y="5" width="calc(100%-10px)" height="calc(100%-10px)" rx="17" fill="none" stroke="${GOLD}" stroke-width=".8" opacity=".38"/>`;
      cmpSec.appendChild(cBorder);
      const cHd=div('');css(cHd,{fontSize:'15px',fontWeight:'800',color:'#fff',marginBottom:'12px',
        position:'relative',zIndex:'1'});setText(cHd,'💘 동행 DNA 궁합');
      const cRow=div('');css(cRow,{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',position:'relative',zIndex:'1'});
      [[DNA_RESULTS[r.good],'💚 찰떡궁합','rgba(34,197,94,.1)','rgba(34,197,94,.3)','#22c55e','최강 듀오!'],
       [DNA_RESULTS[r.bad],'💔 콩떡궁합','rgba(239,68,68,.09)','rgba(239,68,68,.28)','#ef4444','의견충돌 주의']
      ].forEach(([t,label,bg,border,c,memo])=>{
        const box=div('');css(box,{background:bg,borderRadius:'16px',padding:'14px 10px',
          textAlign:'center',border:`1px solid ${border}`});
        const bl=div('');css(bl,{fontSize:'10px',fontWeight:'800',color:c,marginBottom:'7px',letterSpacing:'.03em'});setText(bl,label);
        const be=div('');css(be,{fontSize:'28px',marginBottom:'5px'});setText(be,t?.emoji||'?');
        const bt=div('');css(bt,{fontSize:'11px',fontWeight:'800',color:'rgba(255,255,255,.84)',marginBottom:'3px',lineHeight:'1.3'});setText(bt,t?.type||'');
        const bm=div('');css(bm,{fontSize:'10px',color:c,fontWeight:'600'});setText(bm,memo);
        ap(box,bl,be,bt,bm);cRow.appendChild(box);
      });
      ap(cmpSec,cHd,cRow);

      // ─────────────────────────────────────────
      // ⑤ CTA 버튼
      // ─────────────────────────────────────────
      // CTA — 화면 하단 고정 플로팅
      const ctaSec=div('');
      css(ctaSec,{
        position:'absolute',bottom:'0',left:'0',right:'0',zIndex:'200',
        padding:'12px 16px 28px',
        background:'linear-gradient(to top,rgba(248,243,236,1) 60%,rgba(248,243,236,0))',
        backdropFilter:'blur(8px)',
      });
      const floatBtn=btn('','🤝 이 축제 동행 찾기',()=>setState({showDna:false,tab:'chat',chatTab:'동행',mateView:null,item:null,sub:null}));
      css(floatBtn,{width:'100%',padding:'16px',borderRadius:'9999px',border:'none',cursor:'pointer',
        background:'rgba(74,29,138,.88)',color:'#fff',
        fontSize:'15px',fontWeight:'900',
        boxShadow:`0 8px 28px rgba(74,29,138,.5),inset 0 0 0 1px rgba(232,184,75,.2)`,
        marginBottom:'8px',letterSpacing:'-.02em'});
      const retryBtn=btn('','처음부터 다시 풀기',()=>setState({showDna:true,dnaStep:0,dnaAnswers:[]}));
      css(retryBtn,{width:'100%',padding:'12px',borderRadius:'9999px',
        border:'1.5px solid rgba(74,29,138,.45)',background:'transparent',
        color:'rgba(74,29,138,.82)',fontSize:'13px',fontWeight:'600',cursor:'pointer'});
      ap(ctaSec,floatBtn,retryBtn);

      ap(page,dnaCard,recSec);
      viewport.appendChild(page);
      modal.appendChild(ctaSec);
      [dnaCard,recSec].forEach((sec,i)=>{
        css(sec,{opacity:'0',transform:'translateY(16px)',
          transition:`opacity .48s ${i*.1+.05}s ease,transform .48s ${i*.1+.05}s ease`});
        setTimeout(()=>css(sec,{opacity:'1',transform:'translateY(0)'}),30);
      });
      S.dnaStep=DNA_QUIZ.length;S.dnaAnswers=answers;
      S.dnaHistory=[{
        id:Date.now(),
        date:new Date().toLocaleDateString('ko-KR',{year:'numeric',month:'2-digit',day:'2-digit'}),
        typeKey,badge:r.type,emoji:r.emoji,title:r.title,accent:CORAL,
        answers:[...answers],matched:matched.slice(0,3).map(f=>({id:f.id,title:f.title,loc:f.loc})),
      },...(S.dnaHistory||[])].slice(0,10);

      // 뒤로가기로 복귀한 경우 — 플립·부채 상태 복원 후 TOP3 스크롤
      if(S._dnaFlippedCount||S._dnaSpread){
        const savedFlipped=S._dnaFlippedCount||0;
        const savedSpread=!!S._dnaSpread;
        const savedCard=S._dnaClickedCard??-1;
        S._dnaFlippedCount=0; S._dnaSpread=false; S._dnaClickedCard=undefined;
        requestAnimationFrame(()=>{
          requestAnimationFrame(()=>{
            // 공개된 카드 앞면으로 즉시 복원
            for(let k=0;k<savedFlipped&&k<cardEls2.length;k++){
              const ce=cardEls2[k]; if(!ce) continue;
              if(ce.children[0]) {ce.children[0].style.transition='none';ce.children[0].style.transform='rotateY(-180deg)';}
              if(ce.children[1]) {ce.children[1].style.transition='none';ce.children[1].style.transform='rotateY(0deg)';}
            }
            curCard2=savedFlipped;
            revC2=savedFlipped;
            if(savedSpread){
              // 클릭한 카드가 중앙(pos=1)에 오도록 fanOrder 설정
              if(savedCard>=0&&savedCard<=2){
                const others=[0,1,2].filter(x=>x!==savedCard);
                S._dnaFanOrder=[others[0],savedCard,others[1]];
              }
              spreadAll2();
            }
            // recSec 기준으로 스크롤 (팬 모드에서는 카드가 중앙 겹침 → recSec이 정확)
            const rec=viewport.querySelector('.dna-rec-sec');
            if(rec){
              const vRect=viewport.getBoundingClientRect();
              const rRect=rec.getBoundingClientRect();
              viewport.scrollTo({top:Math.max(0,viewport.scrollTop+(rRect.top-vRect.top)-8),behavior:'instant'});
            }
          });
        });
      }
    }
  }

  function transition(fromSlide,toSlide,direction){
    // direction: 1=앞으로, -1=뒤로
    css(toSlide,{transform:`translateX(${direction>0?'100%':'-100%'})`,transition:'none'});
    viewport.appendChild(toSlide);
    toSlide.getBoundingClientRect();
    css(toSlide,{transform:'translateX(0)',transition:'transform .26s cubic-bezier(.4,0,.2,1)'});
    if(fromSlide) css(fromSlide,{transform:`translateX(${direction>0?'-100%':'100%'})`,
      transition:'transform .26s cubic-bezier(.4,0,.2,1)',opacity:'0'});
    setTimeout(()=>{if(fromSlide)fromSlide.remove();},270);
  }

  function goNext(){
    const nextStep=step+1;
    if(nextStep>=DNA_QUIZ.length){
      const cur=viewport.querySelector('[data-slide]');
      if(cur){css(cur,{transform:'translateX(-100%)',transition:'transform .26s cubic-bezier(.4,0,.2,1)',opacity:'0'});
        setTimeout(()=>showResult(),260);}
      else showResult();
      step=nextStep;return;
    }
    const curSlide=viewport.querySelector(`[data-slide="${step}"]`);
    const nextSlide=makeSlide(nextStep);
    nextSlide.dataset.slide=nextStep;
    transition(curSlide,nextSlide,1);
    setTimeout(()=>{step=nextStep;S.dnaStep=nextStep;S.dnaAnswers=answers;updateHead(nextStep);},270);
  }

  function goPrev(){
    if(step===0) return;
    const prevStep=step-1;
    const curSlide=viewport.querySelector(`[data-slide="${step}"]`);
    const prevSlide=makeSlide(prevStep);
    prevSlide.dataset.slide=prevStep;
    transition(curSlide,prevSlide,-1);
    setTimeout(()=>{step=prevStep;S.dnaStep=prevStep;updateHead(prevStep);},270);
  }

  /* ── 초기 */
  if(step>=DNA_QUIZ.length){showResult();}
  else{
    updateHead(step);
    const initSlide=makeSlide(step);
    initSlide.dataset.slide=step;
    viewport.appendChild(initSlide);
  }
  return modal;
}

function render(){
  const root=document.getElementById('app');
  const frag=document.createDocumentFragment();
  const pages={home:buildHome,map:buildMap,calendar:buildCalendar,chat:buildChat,my:buildMy};
  frag.appendChild((pages[S.tab]||buildHome)());
  frag.appendChild(buildNav());
  if(S.showNotif)  frag.appendChild(buildNotifPanel());
  if(S.showDna)    frag.appendChild(buildDnaModal());
  if(S.showAllLive) frag.appendChild(buildFullListPage('지금 진행 중 축제',S.festivals,false));
  if(S.showAllBest){const sorted=[...S.festivals].sort((a,b)=>b.cong-a.cong);frag.appendChild(buildFullListPage('이번주 핫플 전체보기',sorted,true));}
  if(S.selectedRegion) frag.appendChild(buildRegionPage());
  if(S.selectedTheme) frag.appendChild(buildThemePage());
  if(S.showLiked) frag.appendChild(buildLikedPage());
  if(S.showMyReviews) frag.appendChild(buildMyReviewsPage());
  if(S.showNotice) frag.appendChild(buildNoticePage());
  if(S.showFaq) frag.appendChild(buildFaqPage());
  if(S.showSettings) frag.appendChild(buildSettingsPage());
  if(S.showMyTickets) frag.appendChild(buildMyTicketsPage());
  if(S.item){
    frag.appendChild(buildDetail());
    if(S.sub==='info')         frag.appendChild(buildSubInfo());
    if(S.sub==='congestion')   frag.appendChild(buildSubCong());
    if(S.sub==='reviews')      frag.appendChild(buildSubReviews());
    if(S.sub==='write-review') frag.appendChild(buildSubWrite());
  }
  if(S.mateView==='detail'&&S.selectedMate) frag.appendChild(buildMateDetail());
  if(S.mateView==='write') frag.appendChild(buildMateWrite());
  if(S.mateView==='chat'&&S.chatRoomId) frag.appendChild(buildMateChat());
  if(S.mateView==='myPosts') frag.appendChild(buildMyPosts());
  root.replaceChildren(frag);
}

function buildNotifPanel(){
  const panel=div('notif-panel');

  // backdrop — tap to close
  const backdrop=div('notif-backdrop');
  backdrop.onclick=()=>setState({showNotif:false});
  panel.appendChild(backdrop);

  const sheet=div('notif-sheet');

  // header
  const head=div('notif-head');
  const htitle=div('notif-head-title','나의 알림');
  const closeB=btn('icon-btn','',()=>setState({showNotif:false}));
  closeB.appendChild(icon('x'));
  ap(head,htitle,closeB);

  // body
  const body=div('notif-body');

  if(!S.notifications.length){
    const empty=div('notif-empty');
    const emIco=icon('bell');
    empty.appendChild(emIco);
    empty.appendChild(document.createTextNode('새로운 알림이 없습니다'));
    body.appendChild(empty);
  } else {
    // 읽지 않은 개수 표시
    const unread=S.notifications.filter(n=>n.unread).length;
    if(unread>0){
      const unreadLabel=div('');
      css(unreadLabel,{fontSize:'11px',fontWeight:'700',color:'#D16835',marginBottom:'10px'});
      setText(unreadLabel,`읽지 않은 알림 ${unread}개`);
      body.appendChild(unreadLabel);
    }

    S.notifications.forEach(n=>{
      const item=div(`notif-item${n.unread?' unread':''}`);
      item.onclick=()=>{
        S.notifications=S.notifications.map(x=>x.id===n.id?{...x,unread:false}:x);
        setState({showNotif:true});
      };

      const iconWrap=div('notif-icon-wrap');
      css(iconWrap,{background:n.ic_bg});
      const ico=icon(n.ic);css(ico,{stroke:n.ic_c});
      iconWrap.appendChild(ico);

      const content=div('notif-content');
      const ntitle=div('notif-title');setText(ntitle,n.title);
      const ndesc=div('notif-desc');setText(ndesc,n.desc);
      const ntime=div('notif-time');setText(ntime,n.time);
      ap(content,ntitle,ndesc,ntime);

      if(n.unread){
        const udot=div('notif-unread-dot');
        ap(item,iconWrap,content,udot);
      } else {
        ap(item,iconWrap,content);
      }
      body.appendChild(item);
    });
  }

  ap(sheet,head,body);
  panel.appendChild(sheet);
  return panel;
}
