<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>나들이go</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
*::-webkit-scrollbar{display:none;}
*{-ms-overflow-style:none;scrollbar-width:none;}

html,body{
  height:100%;
  background:#f0f2f5;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  color:#0f172a;
}

/* ── Phone shell (desktop) vs full-screen (mobile) ── */
body{display:flex;align-items:center;justify-content:center;}

#app{
  position:relative;
  width:100%;
  max-width:430px;
  height:100dvh;
  background:#fff;
  overflow:hidden;
  display:flex;
  flex-direction:column;
}

/* On larger screens: phone frame */
@media(min-width:500px){
  #app{
    height:min(900px, 96dvh);
    border-radius:44px;
    box-shadow:0 32px 80px rgba(0,0,0,.28), 0 0 0 10px #1e293b, 0 0 0 12px #334155;
  }
}

/* Safe area padding for notch phones */
.pt-safe{padding-top:env(safe-area-inset-top, 44px);}
.pb-safe{padding-bottom:env(safe-area-inset-bottom, 20px);}

/* ── Animations ── */
@keyframes slideInRight{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes couponSheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes couponBgIn{from{background:rgba(0,0,0,0)}to{background:rgba(0,0,0,.5)}}
@keyframes slideOutRight{from{transform:translateX(0)}to{transform:translateX(105%)}}
@keyframes slideRevealBack{from{transform:translateX(-8%);opacity:.85}to{transform:translateX(0);opacity:1}}
@keyframes slideInFromLeft{from{transform:translateX(-8%);opacity:.85}to{transform:translateX(0);opacity:1}}
@keyframes slideOutLeft{from{transform:translateX(0)}to{transform:translateX(-100%)}}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ping{75%,100%{transform:scale(2.2);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes tarotFlipIn{0%{transform:perspective(900px) rotateY(-90deg) scale(.85);opacity:0}60%{transform:perspective(900px) rotateY(8deg) scale(1.02);opacity:1}80%{transform:perspective(900px) rotateY(-3deg) scale(.99)}100%{transform:perspective(900px) rotateY(0deg) scale(1);opacity:1}}
@keyframes tarotGlow{0%,100%{box-shadow:0 0 30px rgba(255,126,54,.4),0 0 60px rgba(255,126,54,.15)}50%{box-shadow:0 0 50px rgba(255,126,54,.7),0 0 100px rgba(255,126,54,.3)}}
@keyframes tarotParticle{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-60px) scale(0);opacity:0}}
@keyframes tarotReveal{0%{transform:perspective(900px) rotateY(180deg)}100%{transform:perspective(900px) rotateY(0deg)}}
@keyframes floatUp{0%{transform:translateY(8px);opacity:0}100%{transform:translateY(0);opacity:1}}
.slide-right{animation:slideInRight .32s cubic-bezier(.36,.66,.04,1) both;}
/* 쿠폰 바텀시트는 slide-right 제외 */
[style*="z-index:9999"],[style*="z-index:10000"]{animation:none!important;}
.coupon-overlay{position:fixed;inset:0;z-index:9999;display:flex;align-items:flex-end;justify-content:center;animation:couponBgIn .25s ease forwards;}
.coupon-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:430px;padding:20px 20px 48px;text-align:center;animation:couponSheetUp .35s cubic-bezier(.22,.61,.36,1) forwards;}
.slide-up{animation:slideUp .3s cubic-bezier(.16,1,.3,1) both;}
.slide-out-right{animation:slideOutRight .32s cubic-bezier(.36,.66,.04,1) forwards;}
.slide-from-left{animation:slideInFromLeft .32s cubic-bezier(.36,.66,.04,1) both;}
.slide-out-left{animation:slideOutLeft .32s cubic-bezier(.36,.66,.04,1) forwards;}
.fade-in{animation:fadeIn .2s ease both;}
.ping{animation:ping 1.4s cubic-bezier(0,0,.2,1) infinite;}
.bpulse{animation:pulse 2s ease-in-out infinite;}

/* ── Layout utils ── */
.tab-content{flex:1;overflow:hidden;display:flex;flex-direction:column;min-height:0;}
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;}
.hscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

/* ── Page header ── */
.page-header{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding-left:20px;padding-right:20px;padding-bottom:0;
  background:#fff;border-bottom:1px solid #f1f5f9;
  box-shadow:0 1px 3px rgba(0,0,0,.04);flex-shrink:0;
}
.header-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:16px;}
.header-actions{display:flex;gap:4px;}
.icon-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;align-items:center;justify-content:center;border-radius:10px;color:#374151;position:relative;transition:background .15s;}
.icon-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.icon-btn:active{background:#f1f5f9;}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:#ef4444;border-radius:50%;border:1.5px solid #fff;}

/* ── Home-specific header override ── */
.home-header{background:transparent;border-bottom:none;box-shadow:none;padding:0;}
.home-brand-bar{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding-left:20px;padding-right:20px;padding-bottom:14px;
  background:#D16835;display:flex;align-items:center;justify-content:space-between;
}
.home-brand-bar .icon-btn{color:#fff;}
.home-brand-bar .icon-btn:active{background:rgba(255,255,255,.18);}
.home-cat-bar{
  background:#fff;padding:0 20px;
  border-bottom:1px solid #f1f5f9;
  box-shadow:0 1px 3px rgba(0,0,0,.05);
}
.cat-tabs{display:flex;border-bottom:0;}
.cat-tab{
  flex:1;padding:16px 0 16px;font-size:14px;font-weight:700;
  background:none;border:none;border-bottom:2.5px solid transparent;
  cursor:pointer;transition:all .18s;color:#94a3b8;
}
.cat-tab.active{color:#D16835;border-bottom-color:#D16835;}

/* ── Notification Panel ── */
.notif-panel{
  position:absolute;top:0;left:0;right:0;bottom:0;
  z-index:80;display:flex;flex-direction:column;
}
.notif-backdrop{
  position:absolute;inset:0;background:rgba(0,0,0,.35);
}
.notif-sheet{
  position:absolute;top:0;left:0;right:0;
  background:#fff;border-radius:0 0 24px 24px;
  box-shadow:0 8px 32px rgba(0,0,0,.18);
  display:flex;flex-direction:column;
  max-height:72%;
  animation:slideDown .28s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}
.notif-head{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding:max(env(safe-area-inset-top,44px),44px) 20px 16px;
  background:#D16835;display:flex;align-items:center;justify-content:space-between;
  border-radius:0 0 0 0;flex-shrink:0;
}
.notif-head-title{font-size:17px;font-weight:800;color:#fff;}
.notif-head .icon-btn{color:#fff;}
.notif-body{overflow-y:auto;padding:16px;}
.notif-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;border-radius:16px;margin-bottom:10px;
  background:#f8fafc;border:1px solid #f1f5f9;cursor:pointer;
  transition:background .15s;
}
.notif-item:active{background:#f1f5f9;}
.notif-item.unread{background:#FDF5E6;border-color:#f4c49a;}
.notif-icon-wrap{
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.notif-icon-wrap svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.notif-content{flex:1;min-width:0;}
.notif-title{font-size:13px;font-weight:700;color:#0f172a;margin-bottom:3px;line-height:1.4;}
.notif-desc{font-size:12px;color:#64748b;line-height:1.5;}
.notif-time{font-size:10px;color:#94a3b8;margin-top:4px;font-weight:500;}
.notif-unread-dot{width:8px;height:8px;border-radius:50%;background:#D16835;flex-shrink:0;margin-top:4px;}
.notif-empty{padding:48px 0;text-align:center;color:#94a3b8;font-size:13px;}
.notif-empty svg{width:40px;height:40px;stroke:#d1d5db;margin:0 auto 12px;display:block;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.section-hd{display:flex;align-items:center;justify-content:space-between;padding:0 20px;margin-bottom:14px;}
.section-title{font-size:16px;font-weight:800;color:#0f172a;}
.see-all-btn{background:none;border:none;font-size:12px;color:#94a3b8;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:2px;}

/* ── Full list page ── */
.full-list-page{position:absolute;inset:0;background:#f8fafc;display:flex;flex-direction:column;z-index:58;}
.full-list-header{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding-left:16px;padding-right:16px;padding-bottom:14px;
  background:#fff;border-bottom:1px solid #f1f5f9;
  box-shadow:0 1px 4px rgba(0,0,0,.05);flex-shrink:0;
  display:flex;align-items:center;gap:8px;
}
.full-list-title{font-size:17px;font-weight:800;color:#0f172a;flex:1;}
.full-list-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding:16px;}
.fl-card{
  background:#fff;border-radius:12px;margin-bottom:12px;
  display:flex;align-items:center;gap:14px;padding:14px;
  border:1px solid #f1f5f9;box-shadow:0 2px 6px rgba(0,0,0,.05);
  cursor:pointer;transition:transform .12s;
}
.fl-card:active{transform:scale(.98);}
.fl-img{width:80px;height:80px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.fl-info{flex:1;min-width:0;}
.fl-tag{font-size:10px;font-weight:700;color:#D16835;background:#FDF5E6;padding:2px 8px;border-radius:6px;display:inline-block;margin-bottom:5px;}
.fl-title{font-size:14px;font-weight:800;color:#0f172a;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fl-loc{font-size:11px;color:#94a3b8;margin-bottom:5px;}
.fl-meta{display:flex;align-items:center;gap:8px;}
.fl-cong{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;}
.fl-rate{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#374151;}
.fl-rate svg{width:11px;height:11px;stroke:#f59e0b;fill:#f59e0b;}
.fl-rank-badge{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;flex-shrink:0;}

/* ── LIVE cards ── */
.live-scroll{display:flex;overflow-x:auto;gap:14px;padding:0 20px 8px;scroll-snap-type:x mandatory;}
.live-card{flex-shrink:0;width:200px;height:280px;border-radius:16px;overflow:hidden;position:relative;cursor:pointer;scroll-snap-align:center;box-shadow:0 8px 24px rgba(0,0,0,.18);}
.live-card img{width:100%;height:100%;object-fit:cover;display:block;}
.live-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.82) 0%,rgba(0,0,0,.1) 50%,transparent 100%);}
.live-info{position:absolute;bottom:0;left:0;right:0;padding:18px 16px 20px;}
.live-info-title{font-size:16px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:6px;letter-spacing:-.01em;}
.live-info-date{font-size:11px;font-weight:600;color:rgba(255,255,255,.8);background:rgba(255,255,255,.15);backdrop-filter:blur(4px);padding:3px 9px;border-radius:9999px;display:inline-block;}

/* ── Small scroll cards ── */
.small-scroll{display:flex;overflow-x:auto;gap:14px;padding:0 20px 8px;}
.small-card{flex-shrink:0;width:152px;cursor:pointer;}
.sc-img{position:relative;height:200px;border-radius:10px;overflow:hidden;margin-bottom:8px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
.sc-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.small-card:active .sc-img img{transform:scale(1.04);}
.sc-tag{position:absolute;top:8px;left:8px;background:#D16835;color:#fff;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;}
.sc-name{font-weight:700;font-size:13px;color:#0f172a;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.sc-loc{font-size:11px;color:#94a3b8;margin-top:2px;}
.sc-rate{display:flex;align-items:center;font-size:11px;font-weight:700;color:#374151;margin-top:4px;gap:3px;}

/* ── DNA Card ── */
.dna-card{
  margin:16px 20px 10px;border-radius:14px;overflow:hidden;cursor:pointer;
  background:linear-gradient(135deg,#2a0e60 0%,#1e0848 50%,#0d1230 100%);
  padding:16px 18px;
  box-shadow:0 0 28px rgba(74,29,138,.4),0 4px 16px rgba(0,0,0,.25),inset 0 0 0 1px rgba(212,160,48,.3);
  display:flex;justify-content:space-between;align-items:center;
  position:relative;
}
.dna-card:active{transform:scale(.98);}
.dna-text{color:#fff;flex:1;display:flex;flex-direction:column;align-items:flex-start;gap:4px;}
.dna-label{font-size:10px;font-weight:700;background:rgba(212,160,48,.18);color:rgba(232,184,75,.9);border:1px solid rgba(212,160,48,.35);display:inline-block;padding:2px 9px;border-radius:9999px;letter-spacing:.04em;}
.dna-title{font-size:15px;font-weight:900;line-height:1.3;}
.dna-sub{font-size:11px;opacity:.75;font-weight:500;font-style:italic;}
.dna-illust{display:none;}
.dna-start-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin:0 20px 16px;padding:11px;border-radius:10px;
  background:#fff;border:none;cursor:pointer;width:calc(100% - 40px);
  font-size:13px;font-weight:700;color:#D16835;
  box-shadow:0 2px 8px rgba(209,104,53,.15);transition:background .15s;
}
.dna-start-btn:active{background:#FDF5E6;}
.dna-start-btn svg{width:14px;height:14px;stroke:#D16835;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ── BEST3 section ── */
.best3-list{padding:0 20px;display:flex;flex-direction:column;gap:12px;}
.best3-card{
  background:#fff;border-radius:12px;padding:14px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  border:1px solid #f1f5f9;box-shadow:0 2px 8px rgba(0,0,0,.05);
  transition:transform .12s;
}
.best3-card:active{transform:scale(.98);}
.best3-rank{
  font-size:26px;font-weight:900;width:34px;text-align:center;
  flex-shrink:0;line-height:1;
}
.rank-1{color:#D16835;}
.rank-2{color:#94a3b8;}
.rank-3{color:#b45309;}
.best3-img{width:72px;height:72px;border-radius:10px;object-fit:cover;flex-shrink:0;}
.best3-info{flex:1;min-width:0;}
.best3-title{font-size:14px;font-weight:800;color:#0f172a;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.best3-loc{font-size:11px;color:#94a3b8;margin-bottom:6px;}
.best3-meta{display:flex;align-items:center;gap:8px;}
.best3-fire{font-size:11px;font-weight:700;color:#D16835;background:#FDF5E6;padding:3px 8px;border-radius:7px;}
.best3-rate{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:#374151;}
.best3-rate svg{width:11px;height:11px;stroke:#f59e0b;fill:#f59e0b;}
.best3-cong{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

/* ── DNA Quiz Modal ── */
.dna-modal{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;z-index:60;overflow:hidden;animation:slideInRight .28s cubic-bezier(.4,0,.2,1) both;}
.dna-modal-head{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding:max(env(safe-area-inset-top,44px),44px) 20px 20px;
  background:linear-gradient(135deg,#2a0e60 0%,#1a0840 50%,#0d1230 100%);
  flex-shrink:0;
}
.dna-modal-head .close-btn{color:#fff;}
.dna-modal-head .close-btn svg{stroke:#fff;}
.dna-q-num{font-size:11px;font-weight:700;color:rgba(212,160,48,.85);margin-bottom:6px;letter-spacing:.06em;}
.dna-q-text{font-size:19px;font-weight:900;color:#fff;line-height:1.4;text-shadow:0 0 24px rgba(212,160,48,.3);}
.dna-progress{height:3px;background:rgba(212,160,48,.2);border-radius:9999px;margin-top:16px;overflow:hidden;}
.dna-progress-fill{height:100%;background:linear-gradient(90deg,rgba(212,160,48,.6),#d4a030);border-radius:9999px;transition:width .3s ease;}
.dna-choices{padding:24px 20px;display:flex;flex-direction:column;gap:12px;}
.dna-choice{
  padding:16px 20px;border-radius:16px;border:2px solid #f1f5f9;
  background:#f8fafc;cursor:pointer;font-size:14px;font-weight:600;color:#1e293b;
  line-height:1.45;transition:all .15s;text-align:left;
}
.dna-choice:active,.dna-choice.selected{background:#FDF5E6;border-color:#D16835;color:#D16835;}
.dna-result{padding:28px 24px;display:flex;flex-direction:column;align-items:center;text-align:center;flex:1;}
.dna-result-emoji{font-size:72px;margin-bottom:16px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1));}
.dna-result-badge{background:linear-gradient(135deg,#2a0e60 0%,#1a0840 50%,#0d1230 100%);color:#fff;font-size:12px;font-weight:700;padding:5px 16px;border-radius:9999px;margin-bottom:12px;letter-spacing:.04em;}
.dna-result-title{font-size:22px;font-weight:900;color:#0f172a;margin-bottom:8px;}
.dna-result-desc{font-size:13px;color:#64748b;line-height:1.7;margin-bottom:28px;}
.dna-result-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.dna-result-tag{background:#FDF5E6;color:#D16835;font-size:12px;font-weight:700;padding:5px 14px;border-radius:9999px;border:1px solid #f4c49a;}
.dna-result-btn{width:100%;padding:16px;background:#D16835;color:#fff;font-size:14px;font-weight:700;border-radius:16px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(209,104,53,.3);}

.banner{
  background:linear-gradient(120deg,#FDF5E6,#fde8cc);
  border:1px solid #f4c49a;border-radius:12px;
  padding:18px 20px;display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;margin:20px;
}
.banner img{width:58px;height:58px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.12);}

/* ── Region grid ── */
.region-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px;}
.region-cell{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:18px 0;border-radius:10px;cursor:pointer;
  border:1px solid #e2e8f0;background:#f8fafc;transition:all .15s;
}
.region-cell:active{transform:scale(.94);}
.region-cell.hl{background:#D16835;border-color:#D16835;box-shadow:0 4px 14px rgba(209,104,53,.3);}
.rc-icon{margin-bottom:6px;display:flex;align-items:center;justify-content:center;}
.rc-name{font-size:12px;font-weight:700;color:#1e293b;}
.region-cell.hl .rc-name{color:#fff;}
.region-cell.hl .rc-icon svg{stroke:#fff;}
.rc-icon svg{width:22px;height:22px;stroke:#475569;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}

/* ── Theme grid ── */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:20px;}
.theme-cell{position:relative;height:150px;border-radius:12px;overflow:hidden;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.theme-cell:active{transform:scale(.97);}
.theme-cell img{width:100%;height:100%;object-fit:cover;transition:transform .4s;}
.theme-cell:active img{transform:scale(1.04);}
.theme-ov{position:absolute;inset:0;background:rgba(0,0,0,.38);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;gap:6px;}
.theme-ov svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.theme-ov span{font-size:14px;font-weight:700;}

/* ── Map filter bar ── */
.filter-bar{display:flex;overflow-x:auto;padding:10px 16px;gap:7px;border-bottom:1px solid #f1f5f9;background:#fff;flex-shrink:0;}
.filter-pill{padding:6px 14px;border-radius:9999px;font-size:12px;font-weight:700;white-space:nowrap;border:1px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;transition:all .15s;}
.filter-pill.active{background:#0f172a;color:#fff;border-color:#0f172a;}

/* ── Map ── */
.map-area{position:relative;flex:1;background:#eef2f7;overflow:hidden;min-height:0;}
.map-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.65;mix-blend-mode:multiply;pointer-events:none;object-position:center 38%;}
.zoom-ctrl{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.95);border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.12);border:1px solid #e2e8f0;z-index:20;overflow:hidden;}
.zoom-btn{display:block;padding:8px 12px;font-size:18px;font-weight:400;color:#475569;border:none;background:none;cursor:pointer;width:100%;text-align:center;line-height:1;}
.zoom-btn:first-child{border-bottom:1px solid #e2e8f0;}
.map-marker{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:transform .15s;}
.map-marker:hover,.map-marker:active{transform:translate(-50%,-50%) scale(1.06);z-index:20;}
.marker-bubble{background:#fff;border:2px solid;border-radius:9999px;padding:5px 11px;display:flex;align-items:center;gap:5px;box-shadow:0 3px 10px rgba(0,0,0,.14);}
.marker-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.marker-name{font-size:11px;font-weight:800;color:#0f172a;white-space:nowrap;}
.marker-pct{font-size:11px;font-weight:800;}
.marker-tail{width:9px;height:9px;border-bottom:2px solid;border-right:2px solid;background:#fff;position:absolute;left:50%;bottom:-5px;transform:translateX(-50%) rotate(45deg);}
.vestor-badge{margin:8px 16px;background:#f0f9ff;border-radius:12px;padding:9px 14px;display:flex;align-items:center;justify-content:center;gap:7px;font-size:11px;font-weight:700;color:#0369a1;border:1px solid #bae6fd;}
.vestor-badge svg{width:14px;height:14px;stroke:#0369a1;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}

/* ── Map bottom sheet ── */
.map-sheet{background:#fff;border-radius:22px 22px 0 0;box-shadow:0 -3px 16px rgba(0,0,0,.07);flex-shrink:0;padding-bottom:max(env(safe-area-inset-bottom,20px),76px);}
.sheet-handle{width:36px;height:5px;background:#e2e8f0;border-radius:9999px;margin:10px auto 8px;}
.legend-row{display:flex;justify-content:center;gap:18px;padding:10px 0;border-bottom:1px solid #f1f5f9;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#475569;font-weight:700;}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0;}
.rank-list{padding:14px 18px;max-height:180px;overflow-y:auto;}
.rank-title{font-weight:800;font-size:13px;color:#0f172a;margin-bottom:10px;}
.rank-item{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;padding:11px;border-radius:14px;cursor:pointer;margin-bottom:9px;}
.rank-item:active{background:#f1f5f9;}
.rank-left{display:flex;align-items:center;gap:10px;}
.rank-num{font-size:14px;font-weight:800;color:#94a3b8;width:14px;text-align:center;}
.rank-circle{width:38px;height:38px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;}

/* ── Calendar ── */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);row-gap:22px;text-align:center;font-size:13px;font-weight:600;}
.cal-day{position:relative;display:flex;align-items:center;justify-content:center;}
.cal-dot{display:inline-block;width:5px;height:5px;border-radius:50%;position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);}
.cal-today{background:#2563eb;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,.38);}

/* ── Sub tabs ── */
.sub-tabs{display:flex;gap:0;padding:0 20px;border-bottom:1px solid #f1f5f9;background:#fff;flex-shrink:0;position:sticky;top:0;z-index:10;}
.sub-tab{padding:13px 16px 12px;font-size:13px;font-weight:700;border-bottom:2.5px solid transparent;background:none;border-left:none;border-right:none;border-top:none;cursor:pointer;color:#94a3b8;transition:all .15s;white-space:nowrap;}
.sub-tab.active{color:#0f172a;border-bottom-color:#0f172a;}

/* ── Community / Mate System ── */
.post-card{background:#fff;padding:18px;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #f1f5f9;cursor:pointer;margin-bottom:10px;}
.post-card:active{background:#f8fafc;}
.post-type{font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;display:inline-block;}
.type-dong{background:#FDF5E6;color:#D16835;}
.type-car{background:#f5f3ff;color:#7c3aed;}

/* 모집 카드 */
.mate-card{background:#fff;border-radius:12px;border:1px solid #f1f5f9;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;margin-bottom:12px;overflow:hidden;transition:transform .12s;}
.mate-card:active{transform:scale(.98);}
.mate-card-top{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.mate-badge-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin-bottom:8px;}
.mate-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px;}
.mb-fest{background:#FDF5E6;color:#D16835;}
.mb-open{background:#dcfce7;color:#16a34a;}
.mb-closed{background:#fee2e2;color:#dc2626;}
.mb-full{background:#f1f5f9;color:#64748b;}
.mate-title{font-size:14px;font-weight:800;color:#0f172a;line-height:1.4;margin-bottom:6px;}
.mate-meta-row{display:flex;align-items:center;gap:10px;font-size:11px;color:#64748b;flex-wrap:wrap;}
.mate-meta-item{display:flex;align-items:center;gap:3px;font-weight:500;}
.mate-meta-item svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.mate-card-bottom{padding:10px 16px 14px;border-top:1px solid #f8fafc;display:flex;justify-content:space-between;align-items:center;}
.mate-author{display:flex;align-items:center;gap:7px;}
.mate-avatar{width:26px;height:26px;border-radius:50%;background:linear-gradient(135deg,#D16835,#f5a871);display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:800;flex-shrink:0;}
.mate-author-name{font-size:12px;font-weight:600;color:#374151;}
.mate-slots{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;}
.mate-slot-dots{display:flex;gap:3px;}
.mate-slot-dot{width:8px;height:8px;border-radius:50%;}
.mate-slot-filled{background:#D16835;}
.mate-slot-empty{background:#e2e8f0;}
.mate-d-day{font-size:10px;font-weight:800;color:#D16835;background:#FDF5E6;padding:3px 8px;border-radius:6px;}
.mate-d-past{color:#94a3b8;background:#f1f5f9;}

/* 상세 화면 */
.mate-detail-page{position:absolute;inset:0;background:#f8fafc;display:flex;flex-direction:column;z-index:55;}
.mate-detail-hero{background:linear-gradient(135deg,#D16835,#f5a871);padding:20px;flex-shrink:0;}
.mate-detail-fest{font-size:11px;color:rgba(255,255,255,.8);font-weight:600;margin-bottom:4px;}
.mate-detail-title{font-size:18px;font-weight:900;color:#fff;line-height:1.35;margin-bottom:12px;}
.mate-detail-chips{display:flex;flex-wrap:wrap;gap:6px;}
.mate-detail-chip{background:rgba(255,255,255,.22);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:9999px;}
.mate-detail-body{flex:1;overflow-y:auto;padding:16px;}
.mate-info-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #f1f5f9;}
.mate-info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f8fafc;}
.mate-info-row:last-child{border-bottom:none;padding-bottom:0;}
.mate-info-label{font-size:12px;color:#94a3b8;font-weight:600;width:64px;flex-shrink:0;}
.mate-info-val{font-size:13px;font-weight:700;color:#0f172a;}
.mate-info-icon{width:28px;height:28px;border-radius:8px;background:#FDF5E6;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mate-info-icon svg{width:14px;height:14px;stroke:#D16835;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.mate-desc-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #f1f5f9;}
.mate-desc-label{font-size:12px;font-weight:700;color:#0f172a;margin-bottom:8px;}
.mate-desc-text{font-size:13px;color:#374151;line-height:1.7;}
.mate-applicants-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;border:1px solid #f1f5f9;}
.applicant-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f8fafc;}
.applicant-row:last-child{border-bottom:none;}
.applicant-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.applicant-info{flex:1;min-width:0;}
.applicant-name{font-size:13px;font-weight:700;color:#0f172a;}
.applicant-bio{font-size:11px;color:#94a3b8;margin-top:1px;}
.applicant-btns{display:flex;gap:6px;flex-shrink:0;}
.accept-btn{padding:6px 12px;border-radius:8px;background:#D16835;color:#fff;font-size:11px;font-weight:700;border:none;cursor:pointer;}
.reject-btn{padding:6px 12px;border-radius:8px;background:#f1f5f9;color:#64748b;font-size:11px;font-weight:700;border:none;cursor:pointer;}
.accepted-tag{font-size:11px;font-weight:700;color:#16a34a;background:#dcfce7;padding:4px 10px;border-radius:7px;}
.mate-apply-bar{padding:12px 16px;background:#fff;border-top:1px solid #f1f5f9;flex-shrink:0;}
.mate-apply-btn{width:100%;padding:14px;background:#D16835;color:#fff;font-size:14px;font-weight:700;border-radius:12px;border:none;cursor:pointer;box-shadow:0 4px 12px rgba(209,104,53,.28);}
.mate-apply-btn:active{background:#bf5e2d;}
.mate-apply-btn.applied{background:#f1f5f9;color:#94a3b8;box-shadow:none;}
.mate-apply-btn.is-mine{background:#fff;color:#D16835;border:2px solid #D16835;box-shadow:none;}

/* 글쓰기 위저드 */
.write-page{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;z-index:60;}
.write-progress{height:3px;background:#f1f5f9;flex-shrink:0;}
.write-progress-fill{height:100%;background:#D16835;transition:width .3s ease;}
.write-step{flex:1;overflow-y:auto;padding:20px;}
.write-step-title{font-size:18px;font-weight:900;color:#0f172a;margin-bottom:4px;}
.write-step-sub{font-size:12px;color:#94a3b8;margin-bottom:22px;}
.write-label{font-size:12px;font-weight:700;color:#374151;margin-bottom:8px;margin-top:16px;}
.write-label:first-of-type{margin-top:0;}
.write-input{width:100%;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;color:#0f172a;background:#f8fafc;outline:none;font-family:inherit;transition:border-color .2s;}
.write-input:focus{border-color:#D16835;background:#fff;}
.write-textarea{width:100%;height:110px;padding:12px 14px;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;color:#0f172a;background:#f8fafc;outline:none;font-family:inherit;resize:none;line-height:1.6;transition:border-color .2s;}
.write-textarea:focus{border-color:#D16835;background:#fff;}
.option-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px;}
.option-chip{padding:8px 16px;border-radius:9999px;border:1.5px solid #e2e8f0;background:#f8fafc;font-size:12px;font-weight:700;color:#374151;cursor:pointer;transition:all .15s;}
.option-chip.sel{background:#D16835;border-color:#D16835;color:#fff;}
.fest-option{padding:12px 14px;border-radius:10px;border:1.5px solid #e2e8f0;background:#f8fafc;cursor:pointer;display:flex;align-items:center;gap:10px;margin-bottom:8px;transition:all .15s;}
.fest-option.sel{border-color:#D16835;background:#FDF5E6;}
.fest-option-img{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.fest-option-info{flex:1;}
.fest-option-name{font-size:13px;font-weight:700;color:#0f172a;}
.fest-option-date{font-size:11px;color:#94a3b8;margin-top:2px;}
.write-footer{padding:12px 16px;background:#fff;border-top:1px solid #f1f5f9;display:flex;gap:8px;flex-shrink:0;}
.write-prev-btn{padding:14px 20px;border-radius:12px;border:1.5px solid #e2e8f0;background:#fff;font-size:13px;font-weight:700;color:#374151;cursor:pointer;flex-shrink:0;}
.write-next-btn{flex:1;padding:14px;border-radius:12px;border:none;background:#D16835;color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 3px 10px rgba(209,104,53,.25);}
.write-next-btn:disabled{background:#e2e8f0;color:#94a3b8;box-shadow:none;}

/* 채팅 */
.chat-page{position:absolute;inset:0;background:#f8fafc;display:flex;flex-direction:column;z-index:60;}
.chat-header{padding-top:max(env(safe-area-inset-top,44px),44px);padding:max(env(safe-area-inset-top,44px),44px) 16px 14px;background:#fff;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-title{font-size:15px;font-weight:800;color:#0f172a;flex:1;}
.chat-subtitle{font-size:11px;color:#94a3b8;margin-top:1px;}
.chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;}
.chat-bubble-wrap{display:flex;gap:8px;align-items:flex-end;}
.chat-bubble-wrap.mine{flex-direction:row-reverse;}
.chat-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0;}
.chat-bubble{max-width:70%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5;color:#0f172a;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.chat-bubble.mine{background:#D16835;color:#fff;border-radius:16px 4px 16px 16px;}
.chat-bubble.other{border-radius:4px 16px 16px 16px;}
.chat-name{font-size:10px;color:#94a3b8;margin-bottom:2px;font-weight:600;}
.chat-time{font-size:9px;color:#94a3b8;flex-shrink:0;}
.chat-input-bar{padding:10px 12px;background:#fff;border-top:1px solid #f1f5f9;display:flex;gap:8px;align-items:center;flex-shrink:0;padding-bottom:max(calc(env(safe-area-inset-bottom,20px) + 10px),10px);}
.chat-input{flex:1;padding:10px 14px;border-radius:22px;border:1.5px solid #e2e8f0;font-size:13px;background:#f8fafc;outline:none;font-family:inherit;}
.chat-input:focus{border-color:#D16835;background:#fff;}
.chat-send-btn{width:38px;height:38px;border-radius:50%;background:#D16835;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chat-send-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* FAB */
.fab{
  position:absolute;bottom:max(calc(env(safe-area-inset-bottom,20px) + 80px), 96px);
  right:18px;width:52px;height:52px;
  background:#D16835;border-radius:50%;
  box-shadow:0 4px 16px rgba(209,104,53,.4);
  display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;z-index:30;transition:transform .15s;
}
.fab:active{transform:scale(.9);}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* 필터 */
.mate-filter-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;background:#fff;border-bottom:1px solid #f1f5f9;flex-shrink:0;}
.mate-filter{padding:6px 14px;border-radius:9999px;font-size:11px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;white-space:nowrap;transition:all .15s;}
.mate-filter.active{background:#D16835;color:#fff;border-color:#D16835;}
.empty-state{padding:48px 20px;text-align:center;color:#94a3b8;}
.empty-state-icon{font-size:44px;margin-bottom:12px;}
.empty-state-text{font-size:14px;font-weight:600;margin-bottom:4px;color:#374151;}
.empty-state-sub{font-size:12px;}

/* ── My page ── */
.avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:800;box-shadow:0 4px 12px rgba(99,102,241,.28);flex-shrink:0;}
.dna-badge{font-size:11px;font-weight:700;color:#7c3aed;background:#f5f3ff;padding:3px 10px;border-radius:9999px;display:inline-block;margin-top:4px;}
.stats-row{background:#fff;display:grid;grid-template-columns:repeat(3,1fr);padding:18px 10px;border-bottom:1px solid #f1f5f9;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:4px;}
.stat-icon-wrap{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.stat-icon-wrap svg{width:18px;height:18px;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.stat-label{font-size:11px;color:#94a3b8;font-weight:500;}
.stat-val{font-size:13px;font-weight:800;color:#0f172a;}
.menu-list{background:#fff;border-top:1px solid #f1f5f9;}
.menu-row{padding:15px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f8fafc;cursor:pointer;}
.menu-row:last-child{border-bottom:none;}
.menu-row:active{background:#f8fafc;}
.menu-left{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:600;color:#1e293b;}
.menu-left svg{width:18px;height:18px;fill:none;stroke:#64748b;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Bottom nav ── */
.bottom-nav{
  position:absolute;
  bottom:max(calc(env(safe-area-inset-bottom,20px) + 8px), 16px);
  left:0;right:0;
  display:flex;justify-content:center;
  padding:0 16px;z-index:40;pointer-events:none;
}
.nav-inner{
  width:100%;max-width:380px;height:60px;
  background:rgba(255,255,255,.94);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;justify-content:space-around;align-items:center;padding:0 4px;
  border-radius:20px;box-shadow:0 6px 24px rgba(0,0,0,.11);
  border:1px solid rgba(226,232,240,.8);pointer-events:auto;
}
.nav-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:52px;height:48px;border-radius:14px;border:none;background:transparent;
  cursor:pointer;transition:all .15s;padding:0;gap:3px;color:#94a3b8;
}
.nav-btn.active{background:#FDF5E6;color:#D16835;}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke .15s;}
.nav-label{font-size:9px;font-weight:700;}

/* ── Modals ── */
.modal{position:absolute;inset:0;background:#fff;display:flex;flex-direction:column;z-index:50;overflow:hidden;}
.modal-header{
  padding-top:max(env(safe-area-inset-top,44px),44px);
  padding:max(env(safe-area-inset-top,44px),44px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid #f1f5f9;position:sticky;top:0;z-index:30;flex-shrink:0;
}
.modal-title{
  font-size:16px;font-weight:700;color:#0f172a;
  position:absolute;left:0;right:0;text-align:center;
  pointer-events:none;
}
.back-btn{background:none;border:none;cursor:pointer;padding:8px;margin-left:-6px;display:flex;color:#0f172a;}
.back-btn svg,.close-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.close-btn{background:none;border:none;cursor:pointer;padding:8px;display:flex;color:#0f172a;}
.text-btn{background:none;border:none;font-size:13px;font-weight:700;cursor:pointer;padding:4px 8px;}
.text-btn-gray{color:#94a3b8;}
.text-btn-blue{color:#2563eb;}

/* ── Detail ── */
.hero-img{position:relative;height:250px;flex-shrink:0;}
.hero-img img{width:100%;height:100%;object-fit:cover;}
.hero-grad{position:absolute;inset:0;background:linear-gradient(to top,#fff 0%,transparent 56%);}

.info-val{font-size:18px;font-weight:800;margin-bottom:3px;}
.info-lbl{font-size:10px;font-weight:600;color:#94a3b8;}
.sec-lbl{font-size:11px;font-weight:700;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;padding:0 22px;margin-bottom:20px;}

.svc-btn{display:flex;flex-direction:column;align-items:center;gap:7px;cursor:pointer;border:none;background:transparent;padding:0;transition:opacity .15s;}

.svc-name{font-size:10px;font-weight:600;color:#64748b;}

function el(tag,cls,text){const e=document.createElement(tag);if(cls)e.className=cls;if(text!=null)e.textContent=text;return e;}
function div(cls,text){return el('div',cls,text);}
function btn(cls,text,fn){const b=el('button',cls,text);if(fn)b.onclick=fn;return b;}
function ap(p,...ch){ch.flat(9).forEach(c=>{if(c!=null)p.appendChild(typeof c==='string'?document.createTextNode(c):c)});return p;}

function css(e,s){Object.assign(e.style,s);return e;}

// ── 스크롤 위치 저장소
const _scrollPos={};
function _saveScroll(){
  document.querySelectorAll('.scroll-area,.mate-detail-body,.chat-body').forEach(el=>{
    if(el.id) _scrollPos[el.id]=el.scrollTop;
    else if(el.className) _scrollPos['__'+el.className.split(' ')[0]+'__'+(Object.keys(_scrollPos).length)]=el.scrollTop;
  });
}
function _restoreScroll(){
  requestAnimationFrame(()=>{
    document.querySelectorAll('.scroll-area,.mate-detail-body,.chat-body').forEach(el=>{
      const key=el.id||'__'+el.className.split(' ')[0]+'__';
      if(_scrollPos[key]) el.scrollTop=_scrollPos[key];
    });
  });
}

// ── History 래핑된 setState
function setState(p, _opts={}){
  if(p.tab && p.tab!=='map' && window._leafletMap){
    window._leafletMap.remove();
    window._leafletMap=null;
  }
  _saveScroll();
  const prev=JSON.stringify(_stateSnapshot());
  Object.assign(S,p);
  const next=JSON.stringify(_stateSnapshot());
  // 의미 있는 내비게이션이면 pushState
  if(!_opts._pop && !_opts._replace && prev!==next){
    history.pushState({s:next},'');
  }
  if(window._rafPending) cancelAnimationFrame(window._rafPending);
  window._rafPending = requestAnimationFrame(()=>{
    window._rafPending=null;
    render();
    S._back=false;
    S._backFromLeft=false;
    _restoreScroll();
  });
}

// 직렬화할 상태 키 (함수·DOM 제외)
function _stateSnapshot(){
  const {tab,cat,mapFilter,chatTab,item,sub,subData,congTab,
    showNotif,showDna,dnaStep,showAllLive,showAllBest,
    mateFestFilter,mateView,selectedMate,writeStep,chatRoomId,couponTab,dnaHistory}=S;
  return {tab,cat,mapFilter,chatTab,
    item:item?{id:item.id}:null,sub,subData,congTab,
    showNotif,showDna,dnaStep,showAllLive,showAllBest,
    mateFestFilter,mateView,selectedMate,writeStep,chatRoomId,couponTab,dnaHistory,
    _dnaResultReady:S._dnaResultReady||false,
    _dnaFlippedCount:S._dnaFlippedCount||0,
    _dnaSpread:S._dnaSpread||false,
    _dnaClickedCard:S._dnaClickedCard??-1,
  };
}

function openDetail(f){setState({item:f,sub:null});}
function openInfo(id,title){setState({sub:'info',subData:{id,title}});}

function goBack(stateUpdate){
  const app=document.getElementById('app');
  let topEl=null,topZ=0;
  Array.from(app.children).forEach(c=>{
    const z=parseInt(c.style.zIndex||getComputedStyle(c).zIndex||0);
    if(z>topZ){topZ=z;topEl=c;}
  });

  if(topEl && topZ>0){
    // 1. 현재 페이지 클론 → 최상단 고정
    const clone=topEl.cloneNode(true);
    css(clone,{position:'absolute',inset:'0',zIndex:'999',pointerEvents:'none'});
    clone.classList.remove('slide-right','slide-up','fade-in','slide-out-right','slide-from-left');

    // 2. 새 상태를 즉시 렌더 (아래 페이지)
    S._back=true;
    if(window._rafPending) cancelAnimationFrame(window._rafPending);
    _saveScroll();
    const prev=JSON.stringify(_stateSnapshot());
    Object.assign(S,stateUpdate);
    const next=JSON.stringify(_stateSnapshot());
    if(prev!==next) history.pushState({s:next},'');
    render();
    S._back=false;
    _restoreScroll();

    // 3. 아래 페이지에 살짝 왼쪽에서 드러나는 효과
    const newTop=Array.from(app.children).reduce((a,c)=>{
      const z=parseInt(c.style.zIndex||getComputedStyle(c).zIndex||0);
      return z>(parseInt(a?.style.zIndex||0))?c:a;
    },null);
    if(newTop && newTop!==clone){
      newTop.classList.remove('slide-right','fade-in');
      newTop.classList.add('slide-from-left');
    }

    // 4. 클론을 최상단에 얹고 오른쪽으로 슬라이드아웃
    app.appendChild(clone);
    clone.getBoundingClientRect(); // reflow
    clone.classList.add('slide-out-right');
    setTimeout(()=>clone.remove(), 340);
  } else {
    setState(stateUpdate);
  }
}

// ── 브라우저 뒤로가기 (popstate)
window.addEventListener('popstate', e=>{
  if(!e.state?.s) return;
  try{
    const snap=JSON.parse(e.state.s);
    if(snap.item?.id) snap.item=S.festivals.find(f=>f.id===snap.item.id)||null;

    // DNA 결과지 TOP3 상세보기 후 갤럭시 뒤로가기 — 앱 내 뒤로가기와 동일하게 처리
    if(S._dnaResultReady){
      // 플립/카드 상태 보존 (goBack 이후 buildResult에서 읽음)
      const savedFlipped=S._dnaFlippedCount||0;
      const savedSpread=!!S._dnaSpread;
      const savedCard=S._dnaClickedCard??-1;
      // history 스택 재정렬 방지
      const resultSnap=JSON.stringify({
        tab:S.tab,cat:S.cat,mapFilter:S.mapFilter,chatTab:S.chatTab,
        item:null,sub:null,subData:S.subData,congTab:S.congTab,
        showNotif:false,showDna:true,dnaStep:S.dnaStep,
        showAllLive:false,showAllBest:false,
        mateFestFilter:S.mateFestFilter,mateView:null,
        selectedMate:null,writeStep:0,chatRoomId:null,
        couponTab:S.couponTab,dnaHistory:S.dnaHistory,
        _dnaResultReady:false,_dnaFlippedCount:0,_dnaSpread:false,_dnaClickedCard:-1,
      });
      history.replaceState({s:resultSnap},'');
      // 상태 복원 후 buildDetail 뒤로가기와 동일하게 실행
      S._dnaResultReady=true;
      S._dnaFlippedCount=savedFlipped;
      S._dnaSpread=savedSpread;
      S._dnaClickedCard=savedCard;
      goBack({item:null,sub:null,showDna:true});
      return;
    }

    const app=document.getElementById('app');
    let topEl=null,topZ=0;
    Array.from(app.children).forEach(c=>{
      const z=parseInt(c.style.zIndex||getComputedStyle(c).zIndex||0);
      if(z>topZ){topZ=z;topEl=c;}
    });

    if(topEl && topZ>0){
      const clone=topEl.cloneNode(true);
      css(clone,{position:'absolute',inset:'0',zIndex:'999',pointerEvents:'none'});
      clone.classList.remove('slide-right','slide-up','fade-in','slide-out-right','slide-from-left');

      S._back=true;
      if(window._rafPending) cancelAnimationFrame(window._rafPending);
      Object.assign(S,snap);
      render();
      S._back=false;

      app.appendChild(clone);
      clone.getBoundingClientRect();
      clone.classList.add('slide-out-right');
      setTimeout(()=>clone.remove(), 340);
    } else {
      setState(snap,{_pop:true});
    }
  }catch(err){console.warn('popstate parse error',err);}
});

    // ── 이번주 핫플 BEST3

    const sbHd=div('section-hd');
    const sbTitle=div('section-title');
    const fireSpan=div('');css(fireSpan,{fontSize:'16px',marginRight:'5px'});setText(fireSpan,'🔥');
    ap(sbTitle,fireSpan,'이번주 핫플 BEST3');
    const sbAll=btn('see-all-btn','전체보기 ›',()=>setState({showAllBest:true}));
    ap(sbHd,sbTitle,sbAll);

    const best3Festivals=[S.festivals[0],S.festivals[1],S.festivals[3]];
    const best3List=div('best3-list');
    best3Festivals.forEach((f,i)=>{
      const card=div('best3-card');card.onclick=()=>openDetail(f);
      const rankDiv=div(`best3-rank rank-${i+1}`,`${i+1}`);
      const fim=el('img','best3-img');fim.src=f.img;fim.alt=f.title;
      const info=div('best3-info');
      const ftitle=div('best3-title');setText(ftitle,f.title);
      const floc=div('best3-loc');setText(floc,`📍 ${f.loc}`);
      const meta=div('best3-meta');
      const fire=div('best3-fire',BEST3[i].fire);
      const rat=div('best3-rate');
      const rsi=icon('star');css(rsi,{width:'11px',height:'11px',stroke:'#f59e0b',fill:'#f59e0b'});
      ap(rat,rsi,`${f.rating}`);
      const congDot=div('best3-cong');
      const fc=cc(f.cong);css(congDot,{background:fc.bg});
      ap(meta,fire,rat,congDot);
      ap(info,ftitle,floc,meta);
      ap(card,rankDiv,fim,info);
      best3List.appendChild(card);
    });
    ap(secBest,sbHd,best3List);

    ap(main,sec1,sec2,secDna,secBest,bannerWrap);

  } else if(S.cat==='지역별'){
    const p=div('');css(p,{background:'#f8f8f6',minHeight:'100%',paddingBottom:'40px'});

    // ── 상단 헤더
    const rHdr=div('');css(rHdr,{padding:'24px 20px 16px'});
    const rTitle=div('');css(rTitle,{fontSize:'22px',fontWeight:'900',color:'#111',
      letterSpacing:'-.04em',marginBottom:'4px'});
    setText(rTitle,'어디로 나들이 갈까요?');
    const rSub=div('');css(rSub,{fontSize:'13px',color:'#94a3b8',fontWeight:'500'});
    setText(rSub,'지역을 선택하면 축제를 찾아드려요');
    ap(rHdr,rTitle,rSub);

    // 날짜 유틸
    const now=new Date();const thisYear=now.getFullYear();
    function parseDate(mmdd){const[m,d]=mmdd.trim().split('.').map(Number);return new Date(thisYear,m-1,d);}
    function parseFestDates(s){const pts=s.split('-');return{start:parseDate(pts[0]),end:parseDate(pts[1]||pts[0])};}
    const regionMap={'경기/인천':['경기','인천'],'경상':['경북','경남','대구','울산','부산'],'전라':['전북','전남','광주'],'충청':['충북','충남','대전','세종']};
    const MS30=30*24*60*60*1000;
    function congInfo(v){
      if(v>90) return{t:'혼잡',c:'#ef4444',bg:'#fef2f2'};
      if(v>70) return{t:'붐빔',c:'#f59e0b',bg:'#fffbeb'};
      return{t:'여유',c:'#10b981',bg:'#f0fdf4'};
    }

    // ── 지역 이미지
    const regionImgs={
      '서울':'https://images.unsplash.com/photo-1538485399081-7191377e8241?w=600&q=80',
      '경기/인천':'https://images.unsplash.com/photo-1436491865332-7a61a109cc05?w=600&q=80',
      '강원':'https://images.unsplash.com/photo-1548115184-bc6544d06a58?w=600&q=80',
      '제주':'https://images.unsplash.com/photo-1542901031-de7e759cb7a9?w=600&q=80',
      '부산':'https://images.unsplash.com/photo-1559592413-7cec4d0cae2b?w=600&q=80',
      '경상':'https://images.unsplash.com/photo-1540959733332-e94e1b3f1081?w=600&q=80',
      '전라':'https://images.unsplash.com/photo-1551022372-0bdac71f8f3c?w=600&q=80',
      '충청':'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600&q=80',
      '내 주변':'https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?w=600&q=80',
    };

    // ── 지역 그리드
    const grid=div('');css(grid,{
      display:'grid',gridTemplateColumns:'1fr 1fr',
      gap:'12px',padding:'0 20px',marginBottom:'8px',
    });

    // ── 축제 리스트 영역
    const festPanel=div('');css(festPanel,{
      padding:'0 20px',opacity:'0',
      transition:'opacity .3s ease',
    });

    let activeRegion=null;

    function showFestivals(rn,em){
      if(activeRegion===rn){
        // 같은 지역 재클릭 시 닫기
        festPanel.style.opacity='0';
        setTimeout(()=>{festPanel.innerHTML='';css(festPanel,{height:'0',overflow:'hidden'});},300);
        activeRegion=null;
        // 모든 카드 선택 해제
        grid.querySelectorAll('[data-rn]').forEach(c=>{
          c.style.outline='none';
          const overlay=c.querySelector('.rg-glass');
          if(overlay) overlay.style.background='rgba(0,0,0,.32)';
        });
        return;
      }
      activeRegion=rn;

      // 카드 선택 표시
      grid.querySelectorAll('[data-rn]').forEach(c=>{
        const isActive=c.dataset.rn===rn;
        c.style.outline=isActive?'2.5px solid #FF6F61':'none';
        c.style.outlineOffset='2px';
        const overlay=c.querySelector('.rg-glass');
        if(overlay) overlay.style.background=isActive?'rgba(255,111,97,.22)':'rgba(0,0,0,.32)';
      });

      // 필터
      const matchR=f=>{
        if(rn==='내 주변') return true;
        const aliases=regionMap[rn]||[rn];
        return aliases.some(a=>(f.region&&f.region.includes(a))||(f.loc&&f.loc.includes(a)));
      };
      const filtered=S.festivals.filter(matchR);
      const current=[],upcoming=[],past=[];
      filtered.forEach(f=>{
        const{start,end}=parseFestDates(f.date);
        if(now>=start&&now<=end) current.push(f);
        else if(start>now&&start-now<=MS30) upcoming.push(f);
        else if(end<now&&now-end<=MS30) past.push(f);
      });
      const allFests=[...current,...upcoming,...past];

      // 리스트 렌더
      festPanel.innerHTML='';
      css(festPanel,{height:'auto',overflow:'visible'});

      // 섹션 헤더
      const fhd=div('');css(fhd,{
        display:'flex',alignItems:'center',justifyContent:'space-between',
        marginBottom:'16px',paddingTop:'20px',
      });
      const fhl=div('');css(fhl,{fontSize:'16px',fontWeight:'900',color:'#111',letterSpacing:'-.03em'});
      setText(fhl,em+' '+rn+' 축제');
      const fhc=div('');css(fhc,{fontSize:'12px',color:'#94a3b8',fontWeight:'600'});
      setText(fhc,allFests.length+'개');
      ap(fhd,fhl,fhc);festPanel.appendChild(fhd);

      if(!allFests.length){
        const none=div('');css(none,{textAlign:'center',padding:'40px 0',color:'#94a3b8',fontSize:'14px'});
        setText(none,'해당 지역 축제가 없어요 😢');
        festPanel.appendChild(none);
      } else {
        function statusInfo(f){
          const{start,end}=parseFestDates(f.date);
          if(now>=start&&now<=end) return{t:'진행중',c:'#10b981',bg:'#f0fdf4'};
          if(start>now) return{t:'예정',c:'#7c3aed',bg:'#f5f3ff'};
          return{t:'종료',c:'#94a3b8',bg:'#f8fafc'};
        }

        allFests.forEach(f=>{
          const st=statusInfo(f);
          const ct=congInfo(f.cong||50);

          const card=div('');css(card,{
            background:'#fff',borderRadius:'20px',overflow:'hidden',
            marginBottom:'16px',cursor:'pointer',
            boxShadow:'0 2px 16px rgba(0,0,0,.07)',
          });
          card.onclick=()=>setState({item:f,sub:null});

          // 포스터 이미지 (가로 꽉)
          const imgWrap=div('');css(imgWrap,{position:'relative',overflow:'hidden'});
          const img=el('img','');img.src=f.img;img.alt=f.title;
          css(img,{width:'100%',height:'180px',objectFit:'cover',display:'block'});
          img.onerror=()=>{css(imgWrap,{height:'180px',background:'#f1f5f9',display:'flex',
            alignItems:'center',justifyContent:'center',fontSize:'32px'});setText(imgWrap,'🎪');};

          // 이미지 위 상태칩
          const stChip=div('');css(stChip,{
            position:'absolute',top:'12px',left:'12px',
            padding:'4px 10px',borderRadius:'9999px',
            fontSize:'11px',fontWeight:'800',
            background:st.bg,color:st.c,
            backdropFilter:'blur(8px)',
            border:`1px solid ${st.c}30`,
          });setText(stChip,st.t);
          imgWrap.appendChild(img);imgWrap.appendChild(stChip);

          // 텍스트 영역
          const info=div('');css(info,{padding:'16px 16px 14px'});

          const titleEl=div('');css(titleEl,{
            fontSize:'16px',fontWeight:'800',color:'#111',
            marginBottom:'6px',lineHeight:'1.3',letterSpacing:'-.02em',
          });setText(titleEl,f.title);

          const metaRow=div('');css(metaRow,{
            display:'flex',alignItems:'center',gap:'8px',marginBottom:'12px',
          });
          const dateEl=div('');css(dateEl,{fontSize:'12px',color:'#64748b',fontWeight:'500'});
          setText(dateEl,'📅 '+f.date);
          const locEl=div('');css(locEl,{fontSize:'12px',color:'#94a3b8'});
          setText(locEl,'· '+f.loc);
          ap(metaRow,dateEl,locEl);

          // 하단 칩 행
          const chipRow=div('');css(chipRow,{display:'flex',gap:'7px',alignItems:'center'});
          const congChip=div('');css(congChip,{
            fontSize:'11px',fontWeight:'700',
            padding:'5px 11px',borderRadius:'9999px',
            background:ct.bg,color:ct.c,
          });setText(congChip,ct.t);
          const ratingEl=div('');css(ratingEl,{
            fontSize:'11px',fontWeight:'700',color:'#f59e0b',
            padding:'5px 11px',borderRadius:'9999px',
            background:'#fffbeb',
          });setText(ratingEl,'★ '+(f.rating||4.5));
          const detailBtn=div('');css(detailBtn,{
            marginLeft:'auto',fontSize:'12px',fontWeight:'700',color:'#FF6F61',
            padding:'5px 13px',borderRadius:'9999px',
            border:'1.5px solid #FF6F61',cursor:'pointer',
          });setText(detailBtn,'상세보기');
          detailBtn.onclick=(e)=>{e.stopPropagation();setState({item:f,sub:null});};
          ap(chipRow,congChip,ratingEl,detailBtn);

          ap(info,titleEl,metaRow,chipRow);
          ap(card,imgWrap,info);
          festPanel.appendChild(card);
        });
      }

      // 페이드인
      requestAnimationFrame(()=>{
        festPanel.style.opacity='1';
        festPanel.scrollIntoView({behavior:'smooth',block:'nearest'});
      });
    }

    // ── 지역 카드 생성
    REGIONS.forEach(r=>{
      const imgUrl=regionImgs[r.n]||regionImgs['서울'];
      const matchR=f=>{
        if(r.n==='내 주변') return true;
        const aliases=regionMap[r.n]||[r.n];
        return aliases.some(a=>(f.region&&f.region.includes(a))||(f.loc&&f.loc.includes(a)));
      };
      const cnt=S.festivals.filter(matchR).length;

      const card=div('');card.dataset.rn=r.n;
      css(card,{
        borderRadius:'18px',overflow:'hidden',
        position:'relative',cursor:'pointer',
        height:'120px',
        transition:'transform .15s ease,outline .15s ease',
      });
      card.onclick=()=>setState({selectedRegion:{n:r.n,em:r.em||'📍'}});

      // 배경 이미지
      const bg=div('');css(bg,{
        position:'absolute',inset:'0',
        background:`url(${imgUrl}) center/cover no-repeat`,
      });

      // 글래스 오버레이
      const glass=div('rg-glass');css(glass,{
        position:'absolute',inset:'0',
        background:'rgba(0,0,0,.32)',
        transition:'background .2s ease',
      });

      // 텍스트
      const txt=div('');css(txt,{
        position:'absolute',bottom:'0',left:'0',right:'0',
        padding:'12px 14px',
        background:'linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 100%)',
      });
      const nm=div('');css(nm,{fontSize:'16px',fontWeight:'900',color:'#fff',
        letterSpacing:'-.02em',lineHeight:'1.2',textShadow:'0 1px 6px rgba(0,0,0,.4)'});
      setText(nm,r.n);
      const sub=div('');css(sub,{fontSize:'10px',color:'rgba(255,255,255,.65)',fontWeight:'500',marginTop:'1px'});
      setText(sub,cnt?`축제 ${cnt}개`:'탐색하기');
      ap(txt,nm,sub);

      ap(card,bg,glass,txt);
      grid.appendChild(card);
    });

    ap(p,rHdr,grid,festPanel);
    main.appendChild(p);

  } else {
    const p=div('');css(p,{background:'#f8f8f6',minHeight:'100%',paddingBottom:'40px'});
    const rHdr=div('');css(rHdr,{padding:'24px 20px 16px'});
    const rTitle=div('');css(rTitle,{fontSize:'22px',fontWeight:'900',color:'#111',
      letterSpacing:'-.04em',marginBottom:'4px'});
    setText(rTitle,'어떤 축제를 즐기고 싶나요?');
    const rSub=div('');css(rSub,{fontSize:'13px',color:'#94a3b8',fontWeight:'500'});
    setText(rSub,'테마를 선택하면 딱 맞는 축제를 찾아드려요');
    ap(rHdr,rTitle,rSub);

    const grid=div('');css(grid,{
      display:'grid',gridTemplateColumns:'1fr 1fr',
      gap:'12px',padding:'0 20px',
    });

    THEMES.forEach(t=>{
      const card=div('');css(card,{
        borderRadius:'18px',overflow:'hidden',
        position:'relative',cursor:'pointer',
        height:'120px',
        transition:'transform .15s ease',
      });
      card.onclick=()=>setState({selectedTheme:{n:t.n,em:t.em,tags:t.tags,img:t.img}});

      const bg=div('');css(bg,{
        position:'absolute',inset:'0',
        background:`url(${t.img}) center/cover no-repeat`,
      });
      const glass=div('');css(glass,{
        position:'absolute',inset:'0',
        background:'rgba(0,0,0,.32)',
        transition:'background .2s ease',
      });
      const txt=div('');css(txt,{
        position:'absolute',bottom:'0',left:'0',right:'0',
        padding:'12px 14px',
        background:'linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 100%)',
      });
      const nm=div('');css(nm,{
        fontSize:'16px',fontWeight:'900',color:'#fff',
        letterSpacing:'-.02em',lineHeight:'1.2',
        textShadow:'0 1px 6px rgba(0,0,0,.4)',
        display:'flex',alignItems:'center',gap:'6px',
      });setText(nm,(t.em||'✦')+' '+t.n);
      txt.appendChild(nm);ap(card,bg,glass,txt);
      grid.appendChild(card);
    });

    ap(p,rHdr,grid);main.appendChild(p);
  }

  ap(wrap,hdr,main);
  return wrap;
}

  const hRow=div('');css(hRow,{display:'flex',alignItems:'flex-end',justifyContent:'space-between'});
  const hLeft=div('');
  const hTitle=div('');css(hTitle,{fontSize:'22px',fontWeight:'900',letterSpacing:'-.02em',color:'#0f172a'});
  setText(hTitle,'축제 지도');
  const hSub=div('');css(hSub,{fontSize:'12px',color:'#94a3b8',marginTop:'2px'});
  setText(hSub,'지금 어디가 여유로울까?');
  ap(hLeft,hTitle,hSub);
  const vbadge=div('');
  css(vbadge,{display:'flex',alignItems:'center',gap:'4px',background:'#f0f9ff',
    borderRadius:'8px',padding:'5px 9px',fontSize:'10px',fontWeight:'700',
    color:'#0369a1',border:'1px solid #bae6fd'});
  const vico=icon('satellite');
  css(vico,{width:'11px',height:'11px',stroke:'#0369a1',fill:'none',
    strokeWidth:'2',strokeLinecap:'round',strokeLinejoin:'round',flexShrink:'0'});
  ap(vbadge,vico,'LIVE');
  ap(hRow,hLeft,vbadge);
  mapHdr.appendChild(hRow);

  // 검색바
  const sWrap=div('');css(sWrap,{padding:'10px 14px 6px',pointerEvents:'auto',background:'rgba(255,255,255,.96)'});
  const sBox=div('');
  css(sBox,{
    background:'rgba(255,255,255,.96)',borderRadius:'14px',
    boxShadow:'0 4px 20px rgba(0,0,0,.18)',
    display:'flex',alignItems:'center',gap:'8px',padding:'11px 14px'
  });
  const sIco=icon('search');
  css(sIco,{width:'16px',height:'16px',stroke:'#94a3b8',fill:'none',
    strokeWidth:'2',strokeLinecap:'round',strokeLinejoin:'round',flexShrink:'0'});
  const sInp=el('input','');
  sInp.placeholder='축제명, 지역 검색...';
  css(sInp,{flex:'1',border:'none',outline:'none',fontSize:'14px',
    fontWeight:'500',color:'#0f172a',background:'transparent',fontFamily:'inherit'});
  ap(sBox,sIco,sInp);sWrap.appendChild(sBox);

  // 검색 결과 드롭다운
  const sDrop=div('');
  css(sDrop,{background:'#fff',borderRadius:'12px',margin:'4px 14px 0',
    boxShadow:'0 6px 24px rgba(0,0,0,.14)',overflow:'hidden',
    display:'none',pointerEvents:'auto',maxHeight:'200px',overflowY:'auto'});
  sInp.oninput=()=>{
    const q=sInp.value.trim().toLowerCase();
    sDrop.innerHTML='';
    if(!q){sDrop.style.display='none';return;}
    const hits=S.festivals.filter(f=>
      f.title.toLowerCase().includes(q)||f.loc.toLowerCase().includes(q));
    if(!hits.length){sDrop.style.display='none';return;}
    hits.forEach(f=>{
      const row=div('');
      css(row,{display:'flex',alignItems:'center',gap:'10px',
        padding:'11px 14px',cursor:'pointer',borderBottom:'1px solid #f8fafc'});
      const go=()=>{
        sDrop.style.display='none'; sInp.value='';
        if(window._leafletMap) window._leafletMap.setView([f.lat,f.lng],12,{animate:true});
      };
      row.onmousedown=go; row.ontouchstart=go;
      const pin=div('');css(pin,{width:'30px',height:'30px',borderRadius:'8px',
        background:'#FDF5E6',display:'flex',alignItems:'center',
        justifyContent:'center',fontSize:'14px',flexShrink:'0'});
      setText(pin,'📍');
      const info=div('');
      const t1=div('');css(t1,{fontSize:'13px',fontWeight:'700',color:'#0f172a'});setText(t1,f.title);
      const t2=div('');css(t2,{fontSize:'11px',color:'#94a3b8',marginTop:'1px'});setText(t2,f.loc);
      ap(info,t1,t2);ap(row,pin,info);sDrop.appendChild(row);
    });
    sDrop.style.display='block';
  };
  sInp.onblur=()=>setTimeout(()=>{sDrop.style.display='none';},200);

  // 필터 칩
  const fRow=div('');
  css(fRow,{display:'flex',gap:'6px',padding:'6px 14px 2px',
    overflowX:'auto',pointerEvents:'auto',scrollbarWidth:'none'});
  MAP_FILTERS.forEach(f=>{
    const chip=btn('',f,()=>setState({mapFilter:f}));
    css(chip,{
      padding:'6px 14px',borderRadius:'9999px',fontSize:'12px',fontWeight:'700',
      whiteSpace:'nowrap',border:'none',cursor:'pointer',
      boxShadow:'0 2px 8px rgba(0,0,0,.13)',flexShrink:'0',
      background:S.mapFilter===f?'#D16835':'rgba(255,255,255,.95)',
      color:S.mapFilter===f?'#fff':'#374151'
    });
    fRow.appendChild(chip);
  });

  ap(topFloat,mapHdr,sWrap,sDrop,fRow);

  /* ── 3. 바텀 시트 ── */
  // 네비바 높이(약 88px)를 고려해 시트 bottom을 0으로, 대신 z-index를 50으로
  const NAV_H=88;      // 네비바가 차지하는 높이 (approximate)
  const PEEK=NAV_H+70; // 닫혔을 때 네비바 위로 보이는 높이 (핸들+타이틀)
  const SH=Math.round((window.innerHeight||700)*0.58); // 시트 전체 높이

  const sheet=div('');
  css(sheet,{
    position:'absolute',left:'0',right:'0',bottom:'0',
    height:SH+'px',
    transform:'translateY('+(SH-PEEK)+'px)',
    background:'#fff',
    borderRadius:'20px 20px 0 0',
    boxShadow:'0 -6px 30px rgba(0,0,0,.14)',
    zIndex:'50',   // 네비바(40) 위
    display:'flex',flexDirection:'column',
    willChange:'transform',
    transition:'transform .32s cubic-bezier(.4,0,.2,1)'
  });

  // 핸들
  const handleArea=div('');
  css(handleArea,{
    flexShrink:'0',padding:'10px 0 0',
    cursor:'grab',userSelect:'none',WebkitUserSelect:'none'
  });
  const handleBar=div('sheet-handle');
  handleArea.appendChild(handleBar);

  // 타이틀 행
  const titleRow=div('');
  css(titleRow,{
    flexShrink:'0',padding:'2px 18px 10px',
    display:'flex',alignItems:'center',justifyContent:'space-between'
  });
  const titleLeft=div('');
  const tMain=div('');css(tMain,{fontSize:'15px',fontWeight:'800',color:'#0f172a'});
  setText(tMain,'🔥 혼잡도 순위');
  const tSub=div('');css(tSub,{fontSize:'11px',color:'#94a3b8',marginTop:'2px'});
  setText(tSub,'축제를 탭하면 상세보기로 이동해요');
  ap(titleLeft,tMain,tSub);
  titleRow.appendChild(titleLeft);

  // 목록
  const listWrap=div('');
  css(listWrap,{
    flex:'1',overflowY:'auto',padding:'0 14px',
    paddingBottom:'max(calc(env(safe-area-inset-bottom,0px)+8px),8px)',
    WebkitOverflowScrolling:'touch'
  });
  [...S.festivals].sort((a,b)=>b.cong-a.cong).forEach((f,i)=>{
    const c=cc(f.cong);
    const row=div('rank-item');
    row.onclick=()=>openDetail(f);
    const left=div('rank-left');
    // 순위 뱃지
    const num=div('');
    css(num,{
      width:'26px',height:'26px',borderRadius:'50%',flexShrink:'0',
      display:'flex',alignItems:'center',justifyContent:'center',
      fontSize:'12px',fontWeight:'800',
      background:i===0?'#D16835':i===1?'#f5a871':i===2?'#FDF5E6':'#f8fafc',
      color:i===0||i===1?'#fff':i===2?'#D16835':'#94a3b8'
    });
    setText(num,''+(i+1));
    // 썸네일
    const img=el('img','');img.src=f.img;img.alt=f.title;
    css(img,{width:'44px',height:'44px',borderRadius:'10px',objectFit:'cover',flexShrink:'0'});
    // 텍스트
    const info=div('');
    const t1=div('');css(t1,{fontSize:'13px',fontWeight:'700',color:'#0f172a'});setText(t1,f.title);
    const t2=div('');css(t2,{fontSize:'11px',color:'#94a3b8',marginTop:'2px'});setText(t2,f.loc);
    ap(info,t1,t2);ap(left,num,img,info);
    // 혼잡도 뱃지
    const badge=div('');
    css(badge,{padding:'5px 10px',borderRadius:'8px',background:c.cb,
      color:c.tc,fontSize:'11px',fontWeight:'800',flexShrink:'0'});
    setText(badge,c.label);
    ap(row,left,badge);listWrap.appendChild(row);
  });

  ap(sheet,handleArea,titleRow,listWrap);
  ap(wrap,mapEl,topFloat,sheet);

  /* ── 4. 드래그 로직 ── */
  let dragY=null, curTY=SH-PEEK;

  const applyTY=(ty,animate)=>{
    const clamped=Math.max(0,Math.min(SH-PEEK,ty));
    sheet.style.transition=animate?'transform .32s cubic-bezier(.4,0,.2,1)':'none';
    sheet.style.transform='translateY('+clamped+'px)';
    curTY=clamped;
    if(window._leafletMap) setTimeout(()=>window._leafletMap.invalidateSize(),350);
  };

  handleArea.addEventListener('mousedown',e=>{
    e.preventDefault();dragY=e.clientY;handleArea.style.cursor='grabbing';
  });
  handleArea.addEventListener('touchstart',e=>{
    dragY=e.touches[0].clientY;
  },{passive:true});

  const onMove=(cy)=>{
    if(dragY===null) return;
    const dy=cy-dragY;
    applyTY(curTY+dy,false);
    dragY=cy;
  };
  const onUp=()=>{
    if(dragY===null) return;
    dragY=null;
    handleArea.style.cursor='grab';
    applyTY(curTY<(SH-PEEK)*0.4?0:SH-PEEK,true);
  };

  document.addEventListener('mousemove',e=>onMove(e.clientY));
  document.addEventListener('touchmove',e=>onMove(e.touches[0].clientY),{passive:true});
  document.addEventListener('mouseup',onUp);
  document.addEventListener('touchend',onUp);

  /* ── 5. Leaflet 초기화 ── */
  setTimeout(()=>{
    const el=document.getElementById('leaflet-map');
    if(!el) return;
    if(window._leafletMap){window._leafletMap.remove();window._leafletMap=null;}

    const map=L.map('leaflet-map',{
      center:[36.5,127.8],zoom:7,
      zoomControl:false,attributionControl:true
    });
    window._leafletMap=map;

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom:18
    }).addTo(map);

    L.control.zoom({position:'topright'}).addTo(map);

    const toShow=S.mapFilter==='전체'?S.festivals:S.festivals.filter(f=>{
      if(S.mapFilter==='벚꽃') return f.tag==='벚꽃명소';
      if(S.mapFilter==='여름') return f.tag==='여름축제';
      if(S.mapFilter==='전통') return f.tag==='전통문화';
      return true;
    });

    toShow.forEach(f=>{
      const html='<div style="position:relative;display:inline-block;">'
        +'<div style="background:#D16835;color:#fff;border-radius:9999px;'
        +'padding:5px 12px;font-size:11px;font-weight:800;white-space:nowrap;'
        +'box-shadow:0 3px 12px rgba(209,104,53,.5);font-family:-apple-system,sans-serif;'
        +'cursor:pointer;">'+f.title+'</div>'
        +'<div style="width:8px;height:8px;background:#D16835;position:absolute;'
        +'left:50%;bottom:-4px;transform:translateX(-50%) rotate(45deg);'
        +'border-radius:1px;"></div></div>';
      const ico=L.divIcon({html,className:'',iconAnchor:[40,28]});
      L.marker([f.lat,f.lng],{icon:ico}).addTo(map)
        .on('click',()=>{const fest=S.festivals.find(x=>x.id===f.id);if(fest)openDetail(fest);});
    });

    if(!document.getElementById('lp-style')){
      const s=document.createElement('style');s.id='lp-style';
      s.textContent='.leaflet-control-attribution{font-size:9px !important;}'
        +'.leaflet-control-zoom{margin-top:max(calc(env(safe-area-inset-top,44px)+200px),250px) !important;margin-right:12px !important;}';
      document.head.appendChild(s);
    }
    map.invalidateSize();
    setTimeout(()=>map.invalidateSize(),300);
  },100);

  return wrap;
}

function buildChat(){
  const wrap=div(S._back?'tab-content':'tab-content fade-in');css(wrap,{position:'relative'});

  // 헤더
  const hdr=div('page-header');
  const hdrInner=div('');css(hdrInner,{paddingTop:'max(env(safe-area-inset-top,44px),44px)',paddingBottom:'0'});
  const row=div('header-row');css(row,{paddingBottom:'0'});
  const t=div('');css(t,{fontSize:'20px',fontWeight:'900'});setText(t,'동행 모집');
  const myBtn=btn('icon-btn','',()=>setState({mateView:'myPosts'}));
  myBtn.appendChild(icon('user'));
  ap(row,t,myBtn);

  // 탭: 전체 / 내가 신청한
  const tabs=div('sub-tabs');
  [['동행','동행 모집'],['카풀','카풀'],['자유','자유글']].forEach(([id,label])=>{
    const b=btn(`sub-tab${S.chatTab===id?' active':''}`,label,()=>setState({chatTab:id}));
    tabs.appendChild(b);
  });
  ap(hdrInner,row,tabs);hdr.appendChild(hdrInner);

  if(S.chatTab==='동행'){
    // 필터 바
    const REGIONS=['전체','서울','경기','인천','강원','충북','충남','대전','세종','경북','경남','대구','부산','울산','전북','전남','광주','제주'];
    const filterBar=div('mate-filter-bar');
    REGIONS.forEach(r=>{
      const cnt=r==='전체'?0:S.mates.filter(m=>m.region===r).length;
      const label=cnt>0?`${r} ${cnt}`:r;
      const b=btn(`mate-filter${S.mateFestFilter===r?' active':''}`,label,()=>setState({mateFestFilter:r}));
      filterBar.appendChild(b);
    });

    const main=div('scroll-area');css(main,{padding:'14px 14px 100px',background:'#f8fafc'});

    const openCount=S.mates.filter(m=>m.status==='open').length;
    const regionCount=S.mateFestFilter==='전체'?openCount:S.mates.filter(m=>m.region===S.mateFestFilter).length;
    const summary=div('');css(summary,{fontSize:'12px',color:'#94a3b8',fontWeight:'600',marginBottom:'12px'});
    setText(summary,S.mateFestFilter==='전체'?`전국 동행 모집 ${openCount}건 진행 중`:`${S.mateFestFilter} 지역 동행 모집 ${regionCount}건`);
    main.appendChild(summary);

    const filtered=S.mates.filter(m=>{
      if(S.mateFestFilter==='전체') return true;
      return m.region===S.mateFestFilter;
    });

    if(!filtered.length){
      const empty=div('empty-state');
      ap(empty,div('empty-state-icon','🔍'),div('empty-state-text','아직 모집글이 없어요'),div('empty-state-sub','첫 번째로 동행을 구해보세요!'));
      main.appendChild(empty);
    } else {
      filtered.forEach(m=>{ main.appendChild(buildMateCard(m)); });
    }

    const fab=btn('fab','',()=>setState({mateView:'write',writeStep:0,writeData:{}}));
    fab.appendChild(icon('plus'));

    ap(wrap,hdr,filterBar,main,fab);
  } else if(S.chatTab==='카풀'){

        {id:'cp2',title:'서울 → 안동 탈춤축제 카풀 구해요 (9/27)',author:'안동러버',from:'서울 강남',time:'3시간 전',seats:3,fest:'안동 탈춤축제'},
        {id:'cp3',title:'제주 유채꽃 축제 렌터카 같이 타실 분',author:'제주여행',from:'제주공항',time:'5시간 전',seats:1,fest:'제주 유채꽃 축제'},

          background:'#f0fdf4',color:'#16a34a',padding:'3px 8px',borderRadius:'6px'});
        setText(typeBadge,'🚗 카풀');

        setText(seatsEl,`${c.seats||0}자리`);

        setText(authorEl,c.author||'');
        ap(metaRow,fromEl,seatsEl,authorEl);

        ap(card,topRow,titleEl,metaRow);main.appendChild(card);
      });
    }

    const fab=btn('fab','',()=>setState({mateView:'write',writeStep:0,
      writeData:{type:'카풀'}}));

    ap(wrap,hdr,main,fab);
  } else {
    // 자유글 탭 (기존)

      const card=div('post-card');

      ap(authorRow,uico,p.author);
      const cmtRow=div('');css(cmtRow,{display:'flex',alignItems:'center',gap:'5px'});
      const cico=icon('chat');css(cico,{width:'13px',height:'13px',stroke:'currentColor'});
      ap(cmtRow,cico,`댓글 ${p.c}`);
      ap(bottom,authorRow,cmtRow);
      ap(card,topRow,title,bottom);main.appendChild(card);
    });
    const fab=btn('fab','',null);fab.appendChild(icon('plus'));
    ap(wrap,hdr,main,fab);
  }
  return wrap;
}

function buildMateCard(m){
  const card=div('mate-card');
  card.onclick=()=>setState({mateView:'detail',selectedMate:m.id});

  const top=div('mate-card-top');
  const left=div('');css(left,{flex:'1',minWidth:'0'});

  const badgeRow=div('mate-badge-row');
  const festBadge=div('mate-badge mb-fest',m.festName);
  const statusBadge=div(`mate-badge ${m.status==='open'?(m.filledSlots>=m.totalSlots?'mb-full':'mb-open'):'mb-closed'}`,
    m.status==='open'?(m.filledSlots>=m.totalSlots?'마감':'모집중'):'마감');
  ap(badgeRow,festBadge,statusBadge);

  const title=div('mate-title',m.title);

  const metaRow=div('mate-meta-row');
  [[icon('calendar'),`${m.meetDate} ${m.meetTime}`],[icon('user'),m.gender],[icon('user'),m.ageRange]].forEach(([ico,txt])=>{
    const item=div('mate-meta-item');
    css(ico,{width:'12px',height:'12px',stroke:'#94a3b8',fill:'none',strokeWidth:'2',strokeLinecap:'round',strokeLinejoin:'round'});
    ap(item,ico,txt);metaRow.appendChild(item);
  });

  ap(left,badgeRow,title,metaRow);
  ap(top,left);

  const bottom=div('mate-card-bottom');
  const author=div('mate-author');
  const av=div('mate-avatar',m.author[0]);css(av,{background:m.authorColor});

  const right=div('');css(right,{display:'flex',alignItems:'center',gap:'8px'});

  for(let i=0;i<m.totalSlots;i++){

    dots.appendChild(d);
  }
  const slotTxt=div('');css(slotTxt,{fontSize:'11px',fontWeight:'700',color:'#374151'});
  setText(slotTxt,`${m.filledSlots}/${m.totalSlots}명`);
  ap(slots,dots,slotTxt);

  const dday=div(`mate-d-day${m.dday>14?' mate-d-past':''}`,`D-${m.dday}`);
  ap(right,slots,dday);
  ap(bottom,author,right);
  ap(card,top,bottom);
  return card;
}

  });
